<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic Time-Mapped Photo Wall</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  width: 100vw;
  height: 100vh;
  background: #111;
  color: #fff;
  overflow: hidden;
}

#controls-area {
  position: absolute;
  top: 0;
  right: 0;
  padding: 1vw 2vw 5vw 5vw; /* large invisible padding for easier hovers */
  z-index: 100;
}

#controls-area::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 15vw;
  height: 15vw;
  /* Invisible hover activation block stuck to the top corner */
}

#controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: rgba(30, 30, 30, 0.85);
  padding: 15px 25px;
  border-radius: 8px;
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  width: 320px;
  opacity: 0;
  pointer-events: none;
  transform: translateY(-20px) scale(0.95);
  transform-origin: top right;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

#controls-area:hover #controls {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0) scale(1);
}

.control-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#controls label {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
}

input[type="range"] {
  cursor: pointer;
  accent-color: #3b82f6;
  width: 130px;
}

input[type="datetime-local"] {
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 4px;
  border-radius: 4px;
  font-size: 12px;
  font-family: monospace;
}

#container {
  width: 100vw;
  height: 100vh;
  padding: 2vw;
  position: relative;
}

#inner {
  width: 100%;
  height: 100%;
  position: relative;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
}

#overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
}

#loading-overlay {
  position: absolute;
  top: 0; left: 0; width: 100vw; height: 100vh;
  background: rgba(17, 17, 17, 0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  transition: opacity 0.5s;
}

.spinner {
  width: 40px; height: 40px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top-color: #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin { 100% { transform: rotate(360deg); } }
.progress-text { font-size: 18px; letter-spacing: 1px; }
.progress-bar-bg { margin-top: 15px; width: 300px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
.progress-bar-fg { width: 0%; height: 100%; background: #3b82f6; transition: width 0.1s; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="progress-text">Processing Space-Time Data <span id="progress-count">0</span> / <span id="total-count">...</span></div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fg" id="progress-bar"></div>
  </div>
</div>

<div id="controls-area">
  <div id="controls">
    <div class="control-row">
      <label>Start</label>
      <input type="datetime-local" id="start-date">
    </div>
    <div class="control-row">
      <label>End</label>
      <input type="datetime-local" id="end-date">
    </div>
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 5px 0;" />
    <div class="control-row">
      <label for="overlap">Base Overlap: <span id="overlap-val">30</span>%</label>
      <input type="range" id="overlap" min="0" max="95" value="30">
    </div>
    <div class="control-row">
      <label for="max-gap">Max Time Cap: <span id="max-gap-val">3</span>h</label>
      <input type="range" id="max-gap" min="1" max="72" value="3" step="0.5">
    </div>
    <div class="control-row">
      <label for="max-dist">Max Visual Dist: <span id="max-dist-val">10</span>x</label>
      <input type="range" id="max-dist" min="1" max="200" value="10">
    </div>
    <div class="control-row">
      <label for="hover-n">Hover Radius: <span id="hover-n-val">3</span></label>
      <input type="range" id="hover-n" min="0" max="15" value="3">
    </div>
  </div>
</div>

<div id="container">
  <div id="inner">
    <canvas id="wall"></canvas>
    <canvas id="overlay"></canvas>
  </div>
</div>

<script>
  let ALL_IMAGES = []; // {url, ts}
  let FILTERED_IMAGES = []; 
  let normalizedGaps = [];
  
  let loadedBitmaps = new Map();
  let loadedColors = new Map();
  let aspectRatio = 4 / 3; 
  let isCanvasReady = false;

  const canvas = document.getElementById('wall');
  const ctx = canvas.getContext('2d', { alpha: false });
  const overlayCanvas = document.getElementById('overlay');
  const oCtx = overlayCanvas.getContext('2d');
  
  const innerDiv = document.getElementById('inner');
  const loadingOverlay = document.getElementById('loading-overlay');
  
  let hoverIndex = -1;
  let cachedLayoutPoses = [];
  let cachedW = 0; let cachedH = 0; let cachedOffsetY = 0;
  
  const startDateInput = document.getElementById('start-date');
  const endDateInput = document.getElementById('end-date');
  const overlapSlider = document.getElementById('overlap');
  const overlapVal = document.getElementById('overlap-val');
  const maxGapSlider = document.getElementById('max-gap');
  const maxGapVal = document.getElementById('max-gap-val');
  const maxDistSlider = document.getElementById('max-dist');
  const maxDistVal = document.getElementById('max-dist-val');
  const hoverNSlider = document.getElementById('hover-n');
  const hoverNVal = document.getElementById('hover-n-val');
  const toggleBtn = document.getElementById('controls-toggle');
  const controlsPanel = document.getElementById('controls');

  function resizeCanvas() {
    const rect = innerDiv.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    
    overlayCanvas.width = rect.width * dpr;
    overlayCanvas.height = rect.height * dpr;
    oCtx.scale(dpr, dpr);
    
    if (isCanvasReady) calculateAndApplyLayout();
  }
  window.addEventListener('resize', resizeCanvas);

  function loadThumbnail(url, targetWidth) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = async () => {
        const scale = targetWidth / img.width;
        const off = document.createElement('canvas');
        off.width = targetWidth;
        off.height = img.height * scale;
        const oCtx = off.getContext('2d');
        oCtx.drawImage(img, 0, 0, off.width, off.height);
        try {
          const bmp = await createImageBitmap(off);
          resolve(bmp);
        } catch(e) { resolve(off); }
      };
      img.onerror = reject;
      img.src = url;
    });
  }
  
  // Format local date for input[type=datetime-local]
  function toDTLocal(ts) {
     const d = new Date(ts);
     return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
  }

  function recalculateDataFilters() {
      const startMs = startDateInput.value ? new Date(startDateInput.value).getTime() : -Infinity;
      const endMs = endDateInput.value ? new Date(endDateInput.value).getTime() : Infinity;
      
      FILTERED_IMAGES = ALL_IMAGES.filter(img => img.ts >= startMs && img.ts <= endMs);
      
      const N = FILTERED_IMAGES.length;
      normalizedGaps = [];
      if (N === 0) return;
      
      const BASE_GAP_MS = 12000; // Expected baseline capture interval
      const currentMaxGapMs = parseFloat(maxGapSlider.value) * 3600 * 1000;
      const maxDistanceMult = parseFloat(maxDistSlider.value);
      
      for (let i = 0; i < N; i++) {
         if (i === 0) {
            normalizedGaps.push(1); 
         } else {
            let diffMs = FILTERED_IMAGES[i].ts - FILTERED_IMAGES[i-1].ts;
            if (diffMs <= BASE_GAP_MS) {
                normalizedGaps.push(1);
            } else {
                let clamped = Math.min(diffMs, currentMaxGapMs);
                if (currentMaxGapMs <= BASE_GAP_MS) {
                    normalizedGaps.push(maxDistanceMult); // Degenerate case fallback
                } else {
                    let fraction = (clamped - BASE_GAP_MS) / (currentMaxGapMs - BASE_GAP_MS);
                    let multiplier = 1 + fraction * (maxDistanceMult - 1);
                    normalizedGaps.push(multiplier);
                }
            }
         }
      }
  }

  async function init() {
    try {
      resizeCanvas();
      
      const res = await fetch('/slides/api/frames');
      const data = await res.json();
      ALL_IMAGES = data.images || [];
      const N = ALL_IMAGES.length;
      document.getElementById('total-count').innerText = N;
      
      if (N === 0) { loadingOverlay.innerHTML = "No frames found."; return; }

      // Restore saved configs if available
      if (localStorage.getItem('config-overlap')) overlapSlider.value = localStorage.getItem('config-overlap');
      if (localStorage.getItem('config-max-gap')) maxGapSlider.value = localStorage.getItem('config-max-gap');
      if (localStorage.getItem('config-max-dist')) maxDistSlider.value = localStorage.getItem('config-max-dist');
      if (localStorage.getItem('config-hover-n')) hoverNSlider.value = localStorage.getItem('config-hover-n');

      // Setup Date UI bounds
      const defaultStart = toDTLocal(ALL_IMAGES[0].ts);
      const defaultEnd = toDTLocal(ALL_IMAGES[N-1].ts);
      startDateInput.value = localStorage.getItem('config-start-date') || defaultStart;
      endDateInput.value = localStorage.getItem('config-end-date') || defaultEnd;

      recalculateDataFilters();

      await new Promise((resolve) => {
        const firstImg = new Image();
        firstImg.onload = () => { aspectRatio = firstImg.naturalWidth / firstImg.naturalHeight; resolve(); };
        firstImg.onerror = resolve; 
        firstImg.src = ALL_IMAGES[0].url;
      });

      // Concurrent Worker Pool Fetch
      let loaded = 0, currentIndex = 0;
      const workers = Array(60).fill(0).map(async () => {
        while (currentIndex < N) {
          const idx = currentIndex++;
          const imgObj = ALL_IMAGES[idx];
          try {
            const bmp = await loadThumbnail(imgObj.url, 64);
            loadedBitmaps.set(imgObj.url, bmp);
            
            // Extract average color of right-most edge for gap filling
            const tmpCanvas = document.createElement('canvas');
            tmpCanvas.width = 1; tmpCanvas.height = 1;
            const tCtx = tmpCanvas.getContext('2d', { willReadFrequently: true });
            // drawImage(image, sx, sy, sWidth, sHeight, dx, dy, dWidth, dHeight)
            tCtx.drawImage(bmp, bmp.width - 1, 0, 1, bmp.height, 0, 0, 1, 1);
            const data = tCtx.getImageData(0, 0, 1, 1).data;
            loadedColors.set(imgObj.url, {r: data[0], g: data[1], b: data[2]});
            
          } catch(e) {}
          
          loaded++;
          if (loaded % 15 === 0) {
            document.getElementById('progress-count').innerText = loaded;
            document.getElementById('progress-bar').style.width = (loaded / N * 100) + '%';
            if (loaded % 300 === 0) {
               isCanvasReady = true;
               calculateAndApplyLayout(); 
            }
          }
        }
      });
      await Promise.all(workers);

      isCanvasReady = true;
      loadingOverlay.style.opacity = '0';
      setTimeout(() => loadingOverlay.style.display = 'none', 500);
      calculateAndApplyLayout();
    } catch(err) {
      console.error(err);
      loadingOverlay.innerHTML = "<div style='color:red'>Data Loading Failed.</div>";
    }
  }
  
  // Mathematical timeline tracker 
  // Given a test 'w', returns exactly what X, Y and which Row all images land on.
  function getLayoutPositions(w, W, P, h, G, offsetY) {
      let x = 0, r = 0;
      let poses = [];
      const N = FILTERED_IMAGES.length;
      for (let i = 0; i < N; i++) {
          let gap = normalizedGaps[i] * w * (1 - P);
          if (i > 0) {
              if (x + gap + w > W) {
                  let span = x + gap;
                  r += Math.floor(span / W);
                  x = span % W;
                  // If after unwinding exact distance it clips edge, force bump down
                  if (x !== 0 && x + w > W) {
                     r++; x = 0;
                  }
              } else {
                  x += gap;
              }
          }
          poses.push({x, y: offsetY + r * (h + G), r: r});
      }
      return {R: r + 1, poses};
  }

  function renderInnerShadow(rx, ry, rw, rh) {
      if (rw <= 2 || rh <= 2) return;
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(0,0,0,0.6)';
      ctx.strokeRect(rx + 0.5, ry + 0.5, rw - 1, rh - 1);
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.strokeRect(rx + 1.5, ry + 1.5, rw - 3, rh - 3);
      ctx.strokeStyle = 'rgba(0,0,0,0.1)';
      ctx.strokeRect(rx + 2.5, ry + 2.5, rw - 5, rh - 5);
  }

  function drawGap(xA, rA, xB, rB, w, h, W, G, offsetY, color) {
      if (rA > rB) return;
      
      const drawBlock = (rx, ry, rw, rh) => {
          if (rw <= 0 || rh <= 0) return;
          ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, 0.5)`;
          ctx.fillRect(rx, ry, rw, rh);
          renderInnerShadow(rx, ry, rw, rh);
      };
      
      if (rA === rB) {
          let empty_x_start = xA + w;
          let empty_width = xB - empty_x_start;
          if (empty_width > 0.5) {
              drawBlock(empty_x_start, offsetY + rA * (h + G), empty_width, h);
          }
      } else {
          // Fill remaining part of line A
          if (xA + w < W - 0.5) {
              drawBlock(xA + w, offsetY + rA * (h + G), W - (xA + w), h);
          }
          // Fill all intermediate full lines
          for (let r = rA + 1; r < rB; r++) {
              drawBlock(0, offsetY + r * (h + G), W, h);
          }
          // Fill line B start
          if (xB > 0.5) {
             drawBlock(0, offsetY + rB * (h + G), xB, h);
          }
      }
  }

  function calculateAndApplyLayout(limitRender = Infinity) {
    if (!isCanvasReady) return;
    
    // Refresh parameters
    const P = parseInt(overlapSlider.value, 10) / 100;
    overlapVal.innerText = parseInt(overlapSlider.value, 10);
    maxGapVal.innerText = maxGapSlider.value;
    maxDistVal.innerText = maxDistSlider.value;
    hoverNVal.innerText = hoverNSlider.value;
    
    const rect = innerDiv.getBoundingClientRect();
    const W = rect.width;
    const TOP_RESERVED_SPACE = 20; 
    const H = rect.height - TOP_RESERVED_SPACE;
    const A = aspectRatio;
    const G = window.innerWidth * 0.01; 
    
    const N = FILTERED_IMAGES.length;
    
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, W, H);
    
    if (N === 0) return;

    // Numerical Bisection Search to pinpoint max W that rigidly binds all bounds
    let low = 0.1;
    let high = W;
    let optW = 0.1;
    
    for (let step = 0; step < 50; step++) {
        let w_mid = (low + high) / 2;
        // dummy H and G to just retrieve Row count
        let layout = getLayoutPositions(w_mid, W, P, 0, 0, 0);
        let curH = layout.R * (w_mid / A) + (layout.R - 1) * G;
        
        if (curH <= H) {
            optW = w_mid;
            low = w_mid; 
        } else {
            high = w_mid; 
        }
    }

    const w = optW;
    const h = w / A;
    
    // Perform final geometry assignment and paint
    let layout = getLayoutPositions(w, W, P, h, G, 0);
    let totalHeightUsed = (layout.R * h) + (layout.R - 1) * G;
    let emptyVertSpace = Math.max(0, H - totalHeightUsed);
    let offsetY = TOP_RESERVED_SPACE + (emptyVertSpace / 2);
    
    // Draw all timeline gap backgrounds first
    const renderCount = Math.min(limitRender, N);
    for (let i = 1; i < renderCount; i++) {
        const urlA = FILTERED_IMAGES[i-1].url;
        const colorA = loadedColors.get(urlA);
        if (!colorA) continue;
        
        const posA = layout.poses[i-1];
        const posB = layout.poses[i];
        
        drawGap(posA.x, posA.r, posB.x, posB.r, w, h, W, G, offsetY, colorA);
    }
    
    ctx.globalAlpha = 0.5;
    
    let currentDayStr = null;
    
    for (let i = 0; i < renderCount; i++) {
        const imgObj = FILTERED_IMAGES[i];
        const bmp = loadedBitmaps.get(imgObj.url);
        if (!bmp) continue;

        const pos = layout.poses[i];
        
        ctx.globalAlpha = 0.5;
        ctx.drawImage(bmp, pos.x, pos.y + offsetY, w, h);
        
        ctx.globalAlpha = 1.0;
        renderInnerShadow(pos.x, pos.y + offsetY, w, h);
        
        // Render New Date Annotations
        const d = new Date(imgObj.ts);
        const mStr = String(d.getMonth() + 1).padStart(2, '0');
        const dStr = String(d.getDate()).padStart(2, '0');
        const dayID = mStr + '/' + dStr;
        
        if (dayID !== currentDayStr) {
            currentDayStr = dayID;
            const hStr = String(d.getHours()).padStart(2, '0');
            const textStr = `${mStr}/${dStr}/${hStr}`;
            
            ctx.globalAlpha = 0.5;
            ctx.font = "bold 10px 'Courier New', Courier, monospace";
            ctx.textAlign = "left";
            
            const textY = pos.y + offsetY - 5;
            
            const tWidth = ctx.measureText(textStr).width;
            
            // Draw text background backing for readability across gaps
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(pos.x, textY - 9, tWidth + 6, 12);
            
            // Draw text
            ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
            ctx.fillText(textStr, pos.x + 3, textY + 1);
            
            // Revert opacity for next image draws
            ctx.globalAlpha = 0.5;
        }
    }
    ctx.globalAlpha = 1.0;
    
    // Save metric state for overlay hit detection
    cachedLayoutPoses = layout.poses;
    cachedW = w; 
    cachedH = h;
    cachedOffsetY = offsetY;
    oCtx.save(); oCtx.setTransform(1, 0, 0, 1, 0, 0); oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height); oCtx.restore();
    hoverIndex = -1;
  }

  innerDiv.addEventListener('mousemove', (e) => {
      if (!isCanvasReady || cachedLayoutPoses.length === 0) return;
      
      const rect = innerDiv.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      
      let foundIndex = -1;
      let minDistSq = Infinity;
      const renderCount = Math.min(FILTERED_IMAGES.length, cachedLayoutPoses.length);
      
      for (let i = 0; i < renderCount; i++) {
          const pos = cachedLayoutPoses[i];
          const cy = pos.y + cachedOffsetY;
          
          let cx = pos.x + cachedW / 2;
          let centerY = cy + cachedH / 2;
          
          let dx = mx - cx;
          let dy = my - centerY;
          let distSq = dx * dx + dy * dy;
          
          if (distSq < minDistSq) {
              minDistSq = distSq;
              foundIndex = i;
          }
      }
      
      if (foundIndex !== hoverIndex) {
          hoverIndex = foundIndex;
          oCtx.save(); oCtx.setTransform(1, 0, 0, 1, 0, 0); oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height); oCtx.restore();
          
          if (hoverIndex !== -1) {
              const centralImgObj = FILTERED_IMAGES[hoverIndex];
              const pos = cachedLayoutPoses[hoverIndex];
              const cyRaw = pos.y + cachedOffsetY;
              
              const scaleMax = 3.5;
              const hoverN = parseInt(hoverNSlider.value, 10);
              const GAP = 2; // px padding
              
              let dockItems = [];
              let totalWidth = 0;
              
              for (let k = -hoverN; k <= hoverN; k++) {
                  let tgtIdx = hoverIndex + k;
                  if (tgtIdx < 0 || tgtIdx >= FILTERED_IMAGES.length) continue;
                  
                  // Smooth bell-curve drop off scale
                  let ratio = 1 - (Math.abs(k) / (hoverN + 1));
                  let s = 1.0 + (scaleMax - 1.0) * Math.pow(ratio, 1.5);
                  
                  let w_scaled = cachedW * s;
                  if (w_scaled > rect.width * 0.35) {
                      s = (rect.width * 0.35) / cachedW;
                      w_scaled = cachedW * s;
                  }
                  let h_scaled = cachedH * s;
                  
                  dockItems.push({ idx: tgtIdx, k: k, s: s, w: w_scaled, h: h_scaled });
                  totalWidth += w_scaled;
              }
              totalWidth += Math.max(0, dockItems.length - 1) * GAP;
              
              let centralItem = dockItems.find(it => it.k === 0);
              if (!centralItem) return;
              
              let leftWidth = 0;
              for (let it of dockItems) {
                  if (it.k < 0) leftWidth += it.w + GAP;
              }
              
              let targetStartX = pos.x + cachedW / 2 - leftWidth - centralItem.w / 2;
              
              if (targetStartX < 10) targetStartX = 10;
              if (targetStartX + totalWidth > rect.width - 10) targetStartX = rect.width - totalWidth - 10;
              
              let curX = targetStartX;
              for (let it of dockItems) {
                  it.x = curX;
                  it.y = cyRaw + cachedH/2 - it.h/2; // align vertically
                  
                  if (it.y < 35) it.y = 35; // Reserve space for top label
                  if (it.y + it.h > rect.height - 10) it.y = rect.height - it.h - 10;
                  
                  curX += it.w + GAP;
              }
              
              // Sort smallest to largest so biggest shadows cast over smaller neighbors
              dockItems.sort((a,b) => a.s - b.s);
              
              const drawOverlayContent = (overrideCenterImg) => {
                  for (let it of dockItems) {
                      const imgObj = FILTERED_IMAGES[it.idx];
                      let bmp = null;
                      if (it.k === 0 && overrideCenterImg) {
                          bmp = overrideCenterImg;
                      } else {
                          bmp = loadedBitmaps.get(imgObj.url);
                      }
                      if (!bmp) continue;
                      
                      oCtx.shadowColor = 'rgba(0, 0, 0, 0.85)';
                      oCtx.shadowBlur = 10 * it.s;
                      oCtx.shadowOffsetX = 0;
                      oCtx.shadowOffsetY = 5 * it.s;
                      oCtx.globalAlpha = 1.0;
                      
                      oCtx.drawImage(bmp, it.x, it.y, it.w, it.h);
                      
                      oCtx.shadowColor = 'transparent';
                      oCtx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
                      oCtx.lineWidth = 1 + (it.s * 0.2);
                      oCtx.strokeRect(it.x, it.y, it.w, it.h);
                      
                      if (it.k === 0) {
                          const d = new Date(imgObj.ts);
                          const mStr = String(d.getMonth() + 1).padStart(2, '0');
                          const dStr = String(d.getDate()).padStart(2, '0');
                          const hStr = String(d.getHours()).padStart(2, '0');
                          const MStr = String(d.getMinutes()).padStart(2, '0');
                          const sStr = String(d.getSeconds()).padStart(2, '0');
                          const textStr = `${mStr}/${dStr} ${hStr}:${MStr}:${sStr}`;
                          
                          oCtx.font = "bold 13px 'Courier New', Courier, monospace";
                          const tW = oCtx.measureText(textStr).width;
                          
                          let tx = it.x + it.w / 2 - tW / 2;
                          let ty = it.y - 28; // Completely float above the frame securely
                          
                          oCtx.fillStyle = "rgba(0, 0, 0, 0.85)";
                          oCtx.fillRect(tx - 10, ty, tW + 20, 22);
                          oCtx.fillStyle = "rgba(255, 255, 255, 1)";
                          oCtx.fillText(textStr, tx, ty + 15);
                      }
                  }
              };
              
              drawOverlayContent(null);
              
              const imgObj = FILTERED_IMAGES[hoverIndex];
              const highResUrl = imgObj.url.replace('thumbnails-data', 'frames-data');
              const currentHoverMatch = hoverIndex;
              const img = new Image();
              img.onload = () => {
                  if (hoverIndex === currentHoverMatch) {
                      oCtx.save(); oCtx.setTransform(1, 0, 0, 1, 0, 0); oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height); oCtx.restore();
                      drawOverlayContent(img);
                  }
              };
              img.src = highResUrl;
          }
      }
  });
  
  innerDiv.addEventListener('mouseleave', () => {
      oCtx.save(); oCtx.setTransform(1, 0, 0, 1, 0, 0); oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height); oCtx.restore();
      hoverIndex = -1;
  });

  const inputs = [overlapSlider, maxGapSlider, maxDistSlider, startDateInput, endDateInput, hoverNSlider];
  inputs.forEach(el => {
     el.addEventListener('input', () => {
         // Save to localStorage
         localStorage.setItem('config-' + el.id, el.value);
         
         // UI event debouncer
         if (el.id === 'start-date' || el.id === 'end-date' || el.id === 'max-gap' || el.id === 'max-dist') {
             recalculateDataFilters();
         }
         requestAnimationFrame(() => calculateAndApplyLayout());
     });
  });
  
  init();
</script>
</body>
</html>
