<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceSelfLog — Slides</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #1a1a1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: #fff;
  }

  /* ── Top toolbar ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: #111;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
    user-select: none;
  }

  #slide-counter {
    font-size: 13px;
    color: #888;
    min-width: 70px;
  }

  .tb-btn {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #ddd;
    padding: 5px 14px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .tb-btn:hover { background: #3a3a3a; }
  .tb-btn:disabled { opacity: 0.3; cursor: default; }

  .tb-btn.primary {
    background: #2c5f8a;
    border-color: #3a7abf;
    color: #fff;
  }
  .tb-btn.primary:hover { background: #3570a0; }

  .tb-btn.danger {
    background: #5a1a1a;
    border-color: #8a3333;
    color: #ffaaaa;
  }
  .tb-btn.danger:hover { background: #6a2020; }

  #toolbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  #save-status {
    font-size: 12px;
    color: #555;
    min-width: 80px;
    text-align: right;
  }
  #save-status.saved { color: #4a8a4a; }
  #save-status.saving { color: #8a7a3a; }

  /* ── Meta fields ── */
  #meta-bar {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 8px 48px;
    flex-shrink: 0;
  }

  #section-name {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    width: 80px;
    min-width: 10px;
  }
  #section-name::placeholder { color: #444; }

  #section-sizer {
    position: absolute;
    visibility: hidden;
    white-space: pre;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    pointer-events: none;
  }

  #meta-divider {
    color: #555;
    font-size: 20px;
    flex-shrink: 0;
    user-select: none;
  }

  #subtitle {
    font-size: 18px;
    font-weight: 300;
    color: #fff;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    flex: 1;
  }
  #subtitle::placeholder { color: #444; }

  /* ── Body row (sidebar + main) ── */
  #body-row {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 200px;
    min-width: 200px;
    background: #111;
    border-right: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.22s ease, min-width 0.22s ease;
  }
  #sidebar.collapsed {
    width: 0;
    min-width: 0;
    border-right: none;
  }

  #sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px 8px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
    flex-shrink: 0;
    white-space: nowrap;
  }

  #sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #sidebar-list::-webkit-scrollbar { width: 4px; }
  #sidebar-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .thumb {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 3px;
    cursor: pointer;
    padding: 0;
    overflow: hidden;
    transition: border-color 0.12s;
    flex-shrink: 0;
  }
  .thumb:hover { border-color: #555; }
  .thumb.active { border-color: #2a2a2a; }
  .thumb.active .thumb-preview { outline: 2px solid #4a90c4; outline-offset: -2px; }

  /* Mini slide preview (16:9) */
  .thumb-preview {
    background: #fff;
    width: 100%;
    aspect-ratio: 16 / 9;
  }

  .thumb-meta {
    padding: 5px 7px 6px;
  }
  .thumb-section {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #aaa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .thumb-subtitle {
    font-size: 10px;
    font-weight: 300;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }
  .thumb-num {
    font-size: 9px;
    color: #fff;
    margin-top: 2px;
  }

  /* ── Toggle button ── */
  #btn-sidebar {
    font-size: 13px;
    padding: 5px 10px;
  }

  /* ── Main area ── */
  #main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 48px;
    overflow: hidden;
  }

  /* ── Slide ── */
  #slide {
    background: #fff;
    width: 100%;
    aspect-ratio: 16 / 9;
    max-height: calc(100vh - 100px);
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    position: relative;
    overflow: hidden;
  }

  /* Nav arrows */
  .nav-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.06);
    border: none;
    color: #555;
    font-size: 26px;
    width: 36px;
    height: 80px;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-arrow:hover { background: rgba(255,255,255,0.14); color: #ddd; }
  .nav-arrow:disabled { opacity: 0.12; cursor: default; }
  #nav-prev { left: 6px; }
  #nav-next { right: 6px; }
</style>
</head>
<body>

<div id="toolbar">
  <button class="tb-btn" id="btn-sidebar" title="Toggle slide panel">&#9776;</button>
  <span id="slide-counter">1 / 1</span>
  <button class="tb-btn" id="btn-prev" disabled>&#8592; Prev</button>
  <button class="tb-btn" id="btn-next" disabled>Next &#8594;</button>
  <button class="tb-btn primary" id="btn-add">+ Add Slide</button>
  <button class="tb-btn danger" id="btn-delete">Delete</button>
  <div id="toolbar-right">
    <span id="save-status"></span>
  </div>
</div>

<div id="meta-bar">
  <span id="section-sizer"></span>
  <input id="section-name" type="text" placeholder="SECTION" spellcheck="false" />
  <span id="meta-divider">|</span>
  <input id="subtitle" type="text" placeholder="Slide title or subtitle…" spellcheck="false" />
</div>

<div id="body-row">
  <div id="sidebar">
    <div id="sidebar-header">
      <span>Slides</span>
    </div>
    <div id="sidebar-list"></div>
  </div>

  <div id="main">
    <div id="slide"></div>
  </div>
</div>

<button class="nav-arrow" id="nav-prev" disabled>&#8249;</button>
<button class="nav-arrow" id="nav-next" disabled>&#8250;</button>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let slides = [{ section: "", subtitle: "" }];
let current = 0;
let saveTimer = null;
let sidebarOpen = true;

// ── DOM refs ───────────────────────────────────────────────────────────────
const sectionEl    = document.getElementById("section-name");
const sectionSizer = document.getElementById("section-sizer");
const subtitleEl   = document.getElementById("subtitle");
const counterEl    = document.getElementById("slide-counter");
const saveStatusEl = document.getElementById("save-status");
const btnPrev      = document.getElementById("btn-prev");
const btnNext      = document.getElementById("btn-next");
const btnAdd       = document.getElementById("btn-add");
const btnDelete    = document.getElementById("btn-delete");
const btnSidebar   = document.getElementById("btn-sidebar");
const navPrev      = document.getElementById("nav-prev");
const navNext      = document.getElementById("nav-next");
const sidebar      = document.getElementById("sidebar");
const sidebarList  = document.getElementById("sidebar-list");

// ── Sidebar toggle ─────────────────────────────────────────────────────────
btnSidebar.addEventListener("click", () => {
  sidebarOpen = !sidebarOpen;
  sidebar.classList.toggle("collapsed", !sidebarOpen);
});

// ── Thumbnails ─────────────────────────────────────────────────────────────
function renderSidebar() {
  sidebarList.innerHTML = "";
  slides.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "thumb" + (i === current ? " active" : "");
    div.innerHTML = `
      <div class="thumb-preview"></div>
      <div class="thumb-meta">
        ${s.section ? `<div class="thumb-section">${s.section}</div>` : ""}
        <div class="thumb-subtitle">${s.subtitle || "<em style='color:#555'>untitled</em>"}</div>
        <div class="thumb-num">${i + 1}</div>
      </div>`;
    div.addEventListener("click", () => goTo(i));
    sidebarList.appendChild(div);
  });
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const s = slides[current];
  sectionEl.value  = s.section  || "";
  subtitleEl.value = s.subtitle || "";
  resizeSection();

  counterEl.textContent = `${current + 1} / ${slides.length}`;

  const hasPrev = current > 0;
  const hasNext = current < slides.length - 1;
  btnPrev.disabled   = !hasPrev;
  btnNext.disabled   = !hasNext;
  navPrev.disabled   = !hasPrev;
  navNext.disabled   = !hasNext;
  btnDelete.disabled = slides.length <= 1;

  renderSidebar();
}

function resizeSection() {
  sectionSizer.textContent = sectionEl.value || sectionEl.placeholder;
  sectionEl.style.width = sectionSizer.offsetWidth + "px";
}

// ── Edit handlers ──────────────────────────────────────────────────────────
sectionEl.addEventListener("input", () => {
  slides[current].section = sectionEl.value;
  resizeSection();
  scheduleSave();
  renderSidebar();
});

subtitleEl.addEventListener("input", () => {
  slides[current].subtitle = subtitleEl.value;
  scheduleSave();
  renderSidebar();
});

// ── Navigation ─────────────────────────────────────────────────────────────
function goTo(idx) {
  current = Math.max(0, Math.min(slides.length - 1, idx));
  render();
  // scroll active thumb into view
  const thumbs = sidebarList.querySelectorAll(".thumb");
  if (thumbs[current]) thumbs[current].scrollIntoView({ block: "nearest", behavior: "smooth" });
}

btnPrev.addEventListener("click",  () => goTo(current - 1));
btnNext.addEventListener("click",  () => goTo(current + 1));
navPrev.addEventListener("click",  () => goTo(current - 1));
navNext.addEventListener("click",  () => goTo(current + 1));

document.addEventListener("keydown", e => {
  if (e.target === sectionEl || e.target === subtitleEl) return;
  if (e.key === "ArrowLeft")  goTo(current - 1);
  if (e.key === "ArrowRight") goTo(current + 1);
});

// ── Add / Delete ───────────────────────────────────────────────────────────
btnAdd.addEventListener("click", () => {
  const newSlide = { section: slides[current].section || "", subtitle: "" };
  slides.splice(current + 1, 0, newSlide);
  current += 1;
  render();
  subtitleEl.focus();
  scheduleSave();
});

btnDelete.addEventListener("click", () => {
  if (slides.length <= 1) return;
  slides.splice(current, 1);
  current = Math.min(current, slides.length - 1);
  render();
  scheduleSave();
});

// ── Persistence ────────────────────────────────────────────────────────────
function scheduleSave() {
  saveStatusEl.textContent = "unsaved";
  saveStatusEl.className   = "";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveSlides, 800);
}

async function saveSlides() {
  saveStatusEl.textContent = "saving…";
  saveStatusEl.className   = "saving";
  try {
    await fetch("/api/slides", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ slides }),
    });
    saveStatusEl.textContent = "saved";
    saveStatusEl.className   = "saved";
    setTimeout(() => { if (saveStatusEl.className === "saved") saveStatusEl.textContent = ""; }, 2000);
  } catch {
    saveStatusEl.textContent = "save failed";
    saveStatusEl.className   = "";
  }
}

async function loadSlides() {
  try {
    const res  = await fetch("/api/slides");
    const data = await res.json();
    if (data.slides && data.slides.length > 0) {
      slides  = data.slides;
      current = 0;
    }
  } catch { /* use defaults */ }
  render();
}

// ── Init ───────────────────────────────────────────────────────────────────
loadSlides();
</script>
</body>
</html>
