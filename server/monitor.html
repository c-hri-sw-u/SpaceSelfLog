<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceSelfLog Monitor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --border:  #2a2d3a;
    --text:    #e2e4ed;
    --muted:   #6b7280;
    --accent:  #6366f1;
    --green:   #22c55e;
    --red:     #ef4444;
    --yellow:  #f59e0b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .02em; }
  #dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
  }
  #dot.ok     { background: var(--green); }
  #dot.error  { background: var(--red); }
  #header-meta { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* ── Layout ── */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  aside {
    width: 300px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  aside h2 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--muted); }
  .field textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    font-family: ui-monospace, "SF Mono", monospace;
    padding: 7px 10px;
    outline: none;
    width: 100%;
    resize: vertical;
    min-height: 140px;
    line-height: 1.5;
    transition: border-color .15s;
  }
  .field textarea:focus { border-color: var(--accent); }
  .field input, .field select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    width: 100%;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }

  #model-row { display: none; }

  .btn-row { display: flex; gap: 8px; }
  button {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s;
  }
  button:hover { opacity: .85; }
  button:disabled { opacity: .4; cursor: default; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost   { background: var(--border); color: var(--text); }

  #test-result {
    font-size: 12px;
    padding: 7px 10px;
    border-radius: 6px;
    display: none;
  }
  #test-result.ok    { background: #16331e; color: var(--green); }
  #test-result.error { background: #2d1414; color: var(--red); }

  .divider { border: none; border-top: 1px solid var(--border); }

  /* ── Feed ── */
  section {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .feed-header {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .feed-header h2 { font-size: 13px; font-weight: 600; }
  #batch-count {
    font-size: 11px;
    background: var(--border);
    padding: 2px 8px;
    border-radius: 99px;
    color: var(--muted);
  }
  #refresh-indicator {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
  }

  #empty-state {
    color: var(--muted);
    text-align: center;
    padding: 60px 20px;
    font-size: 13px;
  }

  /* ── Batch card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 99px;
  }
  .badge.ok    { background: #16331e; color: var(--green); }
  .badge.error { background: #2d1414; color: var(--red); }
  .badge.processing { background: #1e2a14; color: var(--yellow); }

  .card-time   { font-size: 12px; color: var(--muted); }
  .card-id     { font-size: 12px; font-family: monospace; color: var(--text); }
  .card-meta   { font-size: 11px; color: var(--muted); margin-left: auto; }

  .card-frames {
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
  }
  .card-frames img {
    height: 80px;
    width: auto;
    border-radius: 5px;
    object-fit: cover;
    flex-shrink: 0;
    cursor: pointer;
    transition: opacity .15s;
  }
  .card-frames img:hover { opacity: .8; }

  .card-summary {
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
  }
  .card-summary.error { color: var(--red); }
  .card-summary.muted { color: var(--muted); font-style: italic; }

  /* ── Right panel ── */
  #right-panel {
    width: 320px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 0;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: color .15s, border-color .15s;
    letter-spacing: .02em;
  }
  .tab-btn:hover { color: var(--text); opacity: 1; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 12px 14px;
  }
  .tab-content.hidden { display: none; }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .date-nav button {
    background: var(--border);
    color: var(--text);
    border: none;
    border-radius: 5px;
    width: 26px;
    height: 26px;
    cursor: pointer;
    font-size: 15px;
    padding: 0;
    flex: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity .15s;
  }
  .date-nav button:disabled { opacity: .3; cursor: default; }
  #current-date {
    flex: 1;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    font-family: ui-monospace, "SF Mono", monospace;
  }

  .mem-content {
    flex: 1;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.65;
  }
  .mem-content .md-h1 {
    font-size: 13px;
    font-weight: 700;
    margin: 14px 0 5px;
    color: var(--text);
  }
  .mem-content .md-h2 {
    font-size: 12px;
    font-weight: 700;
    margin: 12px 0 4px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .mem-content .md-h3 {
    font-size: 12px;
    font-weight: 600;
    margin: 10px 0 3px;
    color: var(--text);
  }
  .mem-content .md-code {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 6px 8px;
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 11px;
    white-space: pre-wrap;
    margin: 6px 0;
    color: var(--text);
  }
  .mem-content .md-li { padding-left: 10px; color: var(--text); }
  .mem-content .md-li::before { content: "•  "; color: var(--muted); }
  .mem-content p { margin-bottom: 4px; color: var(--text); }
  .mem-content hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .mem-content .md-muted {
    color: var(--muted);
    font-style: italic;
    text-align: center;
    padding: 40px 0;
    font-size: 13px;
  }
  .mem-content .md-comment { display: none; }

  /* ── Lightbox ── */
  #lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #lightbox.open { display: flex; }
  #lightbox img  { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
  #lightbox-close {
    position: fixed; top: 20px; right: 24px;
    font-size: 28px; color: #fff; cursor: pointer; line-height: 1;
    background: none; border: none; padding: 0;
  }
</style>
</head>
<body>

<header>
  <div id="dot"></div>
  <h1>SpaceSelfLog Monitor</h1>
  <span id="header-meta">connecting…</span>
</header>

<main>
  <!-- ── Config sidebar ── -->
  <aside>
    <h2>Configuration</h2>

    <div class="field">
      <label>Provider</label>
      <select id="provider">
        <option value="openrouter">OpenRouter</option>
        <option value="anthropic">Anthropic</option>
      </select>
    </div>

    <div class="field">
      <label>API Key</label>
      <input id="api-key" type="password" placeholder="sk-or-… / sk-ant-…">
    </div>

    <div class="field" id="model-row">
      <label>Model</label>
      <input id="model" type="text" placeholder="anthropic/claude-sonnet-4-6">
    </div>

    <div id="test-result"></div>

    <div class="field">
      <label>VLM Prompt (per-batch)</label>
      <textarea id="prompt" spellcheck="false"></textarea>
    </div>

    <div class="btn-row">
      <button class="btn-ghost" id="btn-reset-prompt">Reset</button>
      <button class="btn-primary" id="btn-save">Save</button>
    </div>

    <div class="field">
      <label>Insight Prompt (rolling summary)</label>
      <textarea id="insight-prompt" spellcheck="false"></textarea>
    </div>

    <div class="btn-row">
      <button class="btn-ghost" id="btn-reset-insight-prompt">Reset</button>
      <button class="btn-primary" id="btn-save-insight-prompt">Save</button>
    </div>

    <div class="field">
      <label>Pattern Prompt (nightly · physical-pattern.md)</label>
      <textarea id="pattern-prompt" spellcheck="false"></textarea>
    </div>

    <div class="btn-row">
      <button class="btn-ghost" id="btn-reset-pattern-prompt">Reset</button>
      <button class="btn-primary" id="btn-save-pattern-prompt">Save</button>
    </div>
    <div class="btn-row">
      <button class="btn-ghost" id="btn-test">Test Connection</button>
    </div>

    <hr class="divider">
    <h2>Directories</h2>

    <div class="field">
      <label>OpenClaw memory/</label>
      <input id="openclaw-dir" type="text" placeholder="/path/to/openclaw/memory">
    </div>

    <div class="field">
      <label>Frames dir</label>
      <input id="frames-dir" type="text" placeholder="~/.spaceselflog/frames">
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="btn-save-dirs">Save Dirs</button>
    </div>
  </aside>

  <!-- ── Batch feed ── -->
  <section>

    <div class="feed-header">
      <h2>Batch Feed</h2>
      <span id="batch-count">0</span>
      <span id="refresh-indicator">–</span>
    </div>
    <div id="feed"></div>
    <div id="empty-state">No batches received yet.<br>Start recording on your iPhone.</div>
  </section>

  <!-- ── Right panel ── -->
  <div id="right-panel">
    <div class="panel-tabs">
      <button class="tab-btn active" data-tab="log">Daily Log</button>
      <button class="tab-btn" data-tab="pattern">Pattern</button>
    </div>

    <!-- Daily Log tab -->
    <div id="tab-log" class="tab-content">
      <div class="date-nav">
        <button id="btn-prev-date" title="Previous day">‹</button>
        <span id="current-date">—</span>
        <button id="btn-next-date" title="Next day">›</button>
      </div>
      <div id="log-content" class="mem-content"><div class="md-muted">Loading…</div></div>
    </div>

    <!-- Pattern tab -->
    <div id="tab-pattern" class="tab-content hidden">
      <div id="pattern-content" class="mem-content"><div class="md-muted">Loading…</div></div>
    </div>
  </div>
</main>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close">×</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ── State ──
let knownBatchIds = new Set();
let configLoaded  = false;

// ── Config ──
async function loadConfig() {
  try {
    const r   = await fetch("/api/config");
    const cfg = await r.json();
    document.getElementById("provider").value      = cfg.provider || "openrouter";
    document.getElementById("api-key").placeholder = cfg.api_key_masked || "";
    document.getElementById("model").value         = cfg.model || "";
    document.getElementById("openclaw-dir").value  = cfg.openclaw_memory_dir || "";
    document.getElementById("frames-dir").value    = cfg.frames_dir || "";
    document.getElementById("prompt").value          = cfg.prompt || "";
    document.getElementById("insight-prompt").value  = cfg.insight_prompt || "";
    document.getElementById("pattern-prompt").value  = cfg.pattern_prompt || "";
    updateModelRowVisibility();
    configLoaded = true;
  } catch(e) { console.error("loadConfig:", e); }
}

function updateModelRowVisibility() {
  const provider = document.getElementById("provider").value;
  document.getElementById("model-row").style.display =
    provider === "openrouter" ? "flex" : "none";
}
document.getElementById("provider").addEventListener("change", updateModelRowVisibility);

async function saveConfig() {
  const btn = document.getElementById("btn-save");
  btn.disabled = true;
  const key = document.getElementById("api-key").value.trim();
  const body = {
    provider: document.getElementById("provider").value,
    model:    document.getElementById("model").value.trim(),
    prompt:   document.getElementById("prompt").value,
  };
  if (key) body.api_key = key;
  try {
    await fetch("/api/config", { method: "POST",
      headers: {"Content-Type": "application/json"}, body: JSON.stringify(body) });
    btn.textContent = "Saved ✓";
    setTimeout(() => { btn.textContent = "Save"; btn.disabled = false; }, 1500);
  } catch(e) { btn.disabled = false; alert("Save failed: " + e); }
}

async function saveDirs() {
  const btn  = document.getElementById("btn-save-dirs");
  btn.disabled = true;
  const body = {
    openclaw_memory_dir: document.getElementById("openclaw-dir").value.trim(),
    frames_dir:          document.getElementById("frames-dir").value.trim(),
  };
  try {
    await fetch("/api/config", { method: "POST",
      headers: {"Content-Type": "application/json"}, body: JSON.stringify(body) });
    btn.textContent = "Saved ✓";
    setTimeout(() => { btn.textContent = "Save Dirs"; btn.disabled = false; }, 1500);
  } catch(e) { btn.disabled = false; alert("Save failed: " + e); }
}

async function testConnection() {
  const btn = document.getElementById("btn-test");
  const el  = document.getElementById("test-result");
  btn.disabled = true;
  el.className = ""; el.style.display = "none";

  const key   = document.getElementById("api-key").value.trim();
  const body  = {
    provider: document.getElementById("provider").value,
    model:    document.getElementById("model").value.trim(),
  };
  if (key) body.api_key = key;

  try {
    const r   = await fetch("/api/test", { method: "POST",
      headers: {"Content-Type": "application/json"}, body: JSON.stringify(body) });
    const data = await r.json();
    el.style.display = "block";
    if (data.ok) {
      el.className   = "ok";
      el.textContent = `✓ Connected — model replied: "${data.reply}"`;
    } else {
      el.className   = "error";
      el.textContent = `✗ ${data.error}`;
    }
  } catch(e) {
    el.style.display = "block";
    el.className     = "error";
    el.textContent   = `✗ ${e}`;
  }
  btn.disabled = false;
}

async function resetPrompt() {
  try {
    await fetch("/api/config", { method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({prompt: ""}) });
    const cfg = await (await fetch("/api/config")).json();
    document.getElementById("prompt").value = cfg.prompt || "";
  } catch(e) { alert("Reset failed: " + e); }
}

async function saveInsightPrompt() {
  const btn = document.getElementById("btn-save-insight-prompt");
  btn.disabled = true;
  try {
    await fetch("/api/config", { method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({insight_prompt: document.getElementById("insight-prompt").value}) });
    btn.textContent = "Saved ✓";
    setTimeout(() => { btn.textContent = "Save"; btn.disabled = false; }, 1500);
  } catch(e) { btn.disabled = false; alert("Save failed: " + e); }
}

async function resetInsightPrompt() {
  try {
    await fetch("/api/config", { method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({insight_prompt: ""}) });
    const cfg = await (await fetch("/api/config")).json();
    document.getElementById("insight-prompt").value = cfg.insight_prompt || "";
  } catch(e) { alert("Reset failed: " + e); }
}

document.getElementById("btn-save").addEventListener("click", saveConfig);
document.getElementById("btn-save-dirs").addEventListener("click", saveDirs);
document.getElementById("btn-test").addEventListener("click", testConnection);
document.getElementById("btn-reset-prompt").addEventListener("click", resetPrompt);
document.getElementById("btn-save-insight-prompt").addEventListener("click", saveInsightPrompt);
document.getElementById("btn-reset-insight-prompt").addEventListener("click", resetInsightPrompt);

async function savePatternPrompt() {
  const btn = document.getElementById("btn-save-pattern-prompt");
  btn.disabled = true;
  try {
    await fetch("/api/config", { method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({pattern_prompt: document.getElementById("pattern-prompt").value}) });
    btn.textContent = "Saved ✓";
    setTimeout(() => { btn.textContent = "Save"; btn.disabled = false; }, 1500);
  } catch(e) { btn.disabled = false; alert("Save failed: " + e); }
}

async function resetPatternPrompt() {
  try {
    await fetch("/api/config", { method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({pattern_prompt: ""}) });
    const cfg = await (await fetch("/api/config")).json();
    document.getElementById("pattern-prompt").value = cfg.pattern_prompt || "";
  } catch(e) { alert("Reset failed: " + e); }
}

document.getElementById("btn-save-pattern-prompt").addEventListener("click", savePatternPrompt);
document.getElementById("btn-reset-pattern-prompt").addEventListener("click", resetPatternPrompt);

// ── Feed ──
function formatTime(isoStr) {
  const d = new Date(isoStr);
  return d.toLocaleTimeString([], {hour: "2-digit", minute: "2-digit", second: "2-digit"});
}

function makeCard(b) {
  const card = document.createElement("div");
  card.className = "card";
  card.dataset.batchId = b.batch_id;

  const statusClass = b.status === "ok" ? "ok"
    : b.status === "error" ? "error" : "processing";

  // Header
  const hdr = document.createElement("div");
  hdr.className = "card-header";
  hdr.innerHTML = `
    <span class="card-time">${formatTime(b.received_at)}</span>
    <span class="card-id">${b.batch_id.slice(0, 24)}</span>
    <span class="badge ${statusClass}">${b.status || "…"}</span>
    <span class="card-meta">${b.frame_count}/${b.input_frames} frames · ${b.session_id.slice(0,12)}</span>
  `;
  card.appendChild(hdr);

  // Frames
  if (b.filenames && b.filenames.length > 0) {
    const framesDiv = document.createElement("div");
    framesDiv.className = "card-frames";
    b.filenames.forEach(fn => {
      const img = document.createElement("img");
      img.src   = `/api/frames/${b.session_id}/${b.batch_id}/${fn}`;
      img.alt   = fn;
      img.addEventListener("click", () => openLightbox(img.src));
      framesDiv.appendChild(img);
    });
    card.appendChild(framesDiv);
  }

  // Summary
  const summaryDiv = document.createElement("div");
  summaryDiv.className = "card-summary";
  if (b.summary) {
    summaryDiv.textContent = b.summary;
  } else if (b.error) {
    summaryDiv.className += " error";
    summaryDiv.textContent = "Error: " + b.error;
  } else {
    summaryDiv.className += " muted";
    summaryDiv.textContent = "Processing…";
  }
  card.appendChild(summaryDiv);

  return card;
}

async function pollBatches() {
  const indicator = document.getElementById("refresh-indicator");
  try {
    const r       = await fetch("/api/batches");
    const batches = await r.json();
    const feed    = document.getElementById("feed");
    const empty   = document.getElementById("empty-state");
    document.getElementById("batch-count").textContent = batches.length;

    if (batches.length === 0) {
      empty.style.display = "block";
    } else {
      empty.style.display = "none";
      batches.forEach(b => {
        if (!knownBatchIds.has(b.batch_id)) {
          knownBatchIds.add(b.batch_id);
          feed.insertBefore(makeCard(b), feed.firstChild);
        }
      });
    }

    // Update header status
    const dot  = document.getElementById("dot");
    const meta = document.getElementById("header-meta");
    dot.className  = "ok";
    meta.textContent = batches.length > 0
      ? `Last batch: ${formatTime(batches[0].received_at)}`
      : "No batches yet";
    indicator.textContent = "↻ " + new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit",second:"2-digit"});
  } catch(e) {
    document.getElementById("dot").className = "error";
    document.getElementById("header-meta").textContent = "Server unreachable";
    indicator.textContent = "–";
  }
}

// ── Lightbox ──
function openLightbox(src) {
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").classList.add("open");
}
document.getElementById("lightbox").addEventListener("click", e => {
  if (e.target === document.getElementById("lightbox") ||
      e.target === document.getElementById("lightbox-close")) {
    document.getElementById("lightbox").classList.remove("open");
  }
});

// ── Right panel: Tabs ──
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c => c.classList.add("hidden"));
    btn.classList.add("active");
    document.getElementById("tab-" + btn.dataset.tab).classList.remove("hidden");
    if (btn.dataset.tab === "pattern") loadPattern();
  });
});

// ── Simple Markdown renderer ──
function renderMarkdown(text) {
  const frag = document.createDocumentFragment();
  let inCode = false, codeLines = [];

  function flush() {
    if (!codeLines.length) return;
    const pre = document.createElement("div");
    pre.className = "md-code";
    pre.textContent = codeLines.join("\n");
    frag.appendChild(pre);
    codeLines = [];
    inCode = false;
  }

  text.split("\n").forEach(raw => {
    const line = raw;

    if (line.startsWith("```")) { inCode ? flush() : (inCode = true); return; }
    if (inCode) { codeLines.push(line); return; }

    // HTML comments — skip
    if (/^<!--/.test(line)) return;

    let el;
    if (/^### /.test(line))       { el = document.createElement("div"); el.className = "md-h3"; el.textContent = line.slice(4); }
    else if (/^## /.test(line))   { el = document.createElement("div"); el.className = "md-h2"; el.textContent = line.slice(3); }
    else if (/^# /.test(line))    { el = document.createElement("div"); el.className = "md-h1"; el.textContent = line.slice(2); }
    else if (/^---+$/.test(line.trim())) { el = document.createElement("hr"); }
    else if (/^[*-] /.test(line)) {
      el = document.createElement("div");
      el.className = "md-li";
      el.innerHTML = inlineFormat(line.slice(2));
    } else if (line.trim() === "") {
      el = document.createElement("div");
      el.style.height = "4px";
    } else {
      el = document.createElement("p");
      el.innerHTML = inlineFormat(line);
    }
    frag.appendChild(el);
  });
  if (inCode) flush();
  return frag;
}

function inlineFormat(s) {
  // Escape HTML, then apply inline markdown
  s = s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/`([^`]+)`/g, "<code style='background:var(--bg);padding:1px 4px;border-radius:3px;font-family:monospace;'>$1</code>");
  return s;
}

// ── Daily Log ──
let logDates = [];
let logDateIndex = 0;

async function loadLogDates() {
  try {
    const r = await fetch("/api/memory/logs");
    if (!r.ok) return;
    logDates = await r.json();
    if (!logDates.length) {
      document.getElementById("current-date").textContent = "No logs";
      document.getElementById("log-content").innerHTML = '<div class="md-muted">No physical-log files found.</div>';
      return;
    }
    // Default to today or most recent
    const today = new Date().toISOString().slice(0, 10);
    const todayIdx = logDates.indexOf(today);
    logDateIndex = todayIdx >= 0 ? todayIdx : 0;
    renderLogDate();
  } catch(e) { console.error("loadLogDates:", e); }
}

function renderLogDate() {
  const date = logDates[logDateIndex];
  document.getElementById("current-date").textContent = date;
  document.getElementById("btn-prev-date").disabled = logDateIndex >= logDates.length - 1;
  document.getElementById("btn-next-date").disabled = logDateIndex <= 0;
  loadLogContent(date);
}

async function loadLogContent(date) {
  const el = document.getElementById("log-content");
  el.innerHTML = '<div class="md-muted">Loading…</div>';
  try {
    const r = await fetch("/api/memory/logs/" + date);
    if (!r.ok) { el.innerHTML = '<div class="md-muted">Not found.</div>'; return; }
    const text = await r.text();
    el.innerHTML = "";
    el.appendChild(renderMarkdown(text));
  } catch(e) { el.innerHTML = '<div class="md-muted">Error loading log.</div>'; }
}

document.getElementById("btn-prev-date").addEventListener("click", () => {
  if (logDateIndex < logDates.length - 1) { logDateIndex++; renderLogDate(); }
});
document.getElementById("btn-next-date").addEventListener("click", () => {
  if (logDateIndex > 0) { logDateIndex--; renderLogDate(); }
});

// ── Pattern ──
async function loadPattern() {
  const el = document.getElementById("pattern-content");
  el.innerHTML = '<div class="md-muted">Loading…</div>';
  try {
    const r = await fetch("/api/memory/pattern");
    if (r.status === 404) { el.innerHTML = '<div class="md-muted">physical-pattern.md not found yet.</div>'; return; }
    if (!r.ok) { el.innerHTML = '<div class="md-muted">Error: ' + r.status + '</div>'; return; }
    const text = await r.text();
    el.innerHTML = "";
    el.appendChild(renderMarkdown(text));
  } catch(e) { el.innerHTML = '<div class="md-muted">Error loading pattern.</div>'; }
}

// ── Init ──
loadConfig();
pollBatches();
setInterval(pollBatches, 3000);
loadLogDates();
</script>
