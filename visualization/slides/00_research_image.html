<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 100%; height: 100%; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      width: 100%; height: 100%;
      background: #fff;
      overflow: hidden;
      color: #111;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP: Hero / Eye Catcher & Flow ── */
    .top {
      flex-shrink: 0;
      height: 38%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4vw;
      position: relative;
    }

    /* Column 2 (Middle): Title */
    .bg-map {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 46vw;
      height: 35vw;
      z-index: 1; /* Below the text block */
      pointer-events: none;
      opacity: 0.85; /* Slightly faded so text is legible */
    }

    .bg-map iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .text-block {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      width: max-content;
    }

    .main-title {
      font-size: 2.6vw;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 0;
      color: #111;
      text-shadow: 
        -0.15vw -0.15vw 0 #fff,  
         0.15vw -0.15vw 0 #fff,
        -0.15vw  0.15vw 0 #fff,
         0.15vw  0.15vw 0 #fff,
         0 -0.15vw 0 #fff,
         0  0.15vw 0 #fff,
        -0.15vw 0 0 #fff,
         0.15vw 0 0 #fff;
    }

    .highlight {
      background: #ffe94d;
      padding: 0 0.2vw;
      color: #111;
      text-shadow: none;
      box-shadow: 0 0 0 0.15vw #fff;
    }

    .subtitle {
      font-size: 1.4vw;
      line-height: 1.3;
      color: #111;
      font-weight: 700;
      margin-top: 1vw;
      letter-spacing: -0.01em;
      text-shadow: 
        -0.1vw -0.1vw 0 #fff,  
         0.1vw -0.1vw 0 #fff,
        -0.1vw  0.1vw 0 #fff,
         0.1vw  0.1vw 0 #fff,
         0 -0.1vw 0 #fff,
         0  0.1vw 0 #fff,
        -0.1vw 0 0 #fff,
         0.1vw 0 0 #fff;
    }

    /* Column 1 (Left): Vertical Flow */
    .flow-block {
      flex: 1.3;
      height: 85%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-left: 5vw; /* Make room for the left-hanging labels */
    }

    .v-flow-container {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 90%;
      padding-left: 6vw; /* Shifted right to make room for big loops */
      width: 100%;
    }

    /* The main downward connecting line */
    .v-line {
      position: absolute;
      top: 0.4vw; bottom: 0.4vw;
      left: 6.34vw; /* Aligned with center of the dots (6.0 padding + 0.4 dot radius - 0.06 line half-width) */
      width: 0.12vw;
      background: #ccc;
      z-index: 1;
    }

    /* Outer loopback line (Agent -> User) */
    .v-loop {
      position: absolute;
      top: -0.1vw; bottom: -0.1vw;
      left: -1vw;
      width: 7vw;
      border: 0.12vw solid #ccc;
      border-right: none;
      z-index: 1;
    }
    .v-loop-label {
      position: absolute;
      top: 50%;
      left: -0.3vw;
      transform: translateY(-50%) translateX(-100%);
      font-size: 0.65vw;
      font-weight: 700;
      color: #888;
      background: #fff;
      padding: 0.2vw 0.5vw;
      text-align: right;
      line-height: 1.2;
    }
    .v-loop-arrow {
      position: absolute;
      top: -0.06vw; /* Exact center of the 0.12vw top border */
      right: 0.2vw;
      transform: translateY(-50%);
      width: 0.8vw;
      height: 0.8vw;
      background: #fff; /* Creates the gap around the arrow */
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .v-loop-arrow::after {
      content: '';
      width: 0;
      height: 0;
      border-top: 0.25vw solid transparent;
      border-bottom: 0.25vw solid transparent;
      border-left: 0.4vw solid #ccc;
    }

    /* Inner loopback line (User -> Agent Feedback) */
    .v-loop-inner {
      position: absolute;
      top: 0.4vw; bottom: 0.4vw;
      left: -0.5vw;
      width: 6.5vw;
      border: 0.12vw solid #ccc;
      border-right: none;
      z-index: 1;
    }
    .v-loop-inner-label {
      position: absolute;
      top: 50%;
      left: 0.3vw; /* Text lives inside the inner loop space */
      transform: translateY(-50%);
      font-size: 0.65vw;
      font-weight: 700;
      color: #888;
      white-space: nowrap;
      background: #fff;
      padding: 0.2vw 0.5vw;
    }
    .v-loop-inner-arrow {
      position: absolute;
      bottom: -0.06vw; /* Exact center of the 0.12vw bottom border */
      right: 0.2vw;
      transform: translateY(50%);
      width: 0.8vw;
      height: 0.8vw;
      background: #fff; /* Creates the gap around the arrow */
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .v-loop-inner-arrow::after {
      content: '';
      width: 0;
      height: 0;
      border-top: 0.25vw solid transparent;
      border-bottom: 0.25vw solid transparent;
      border-left: 0.4vw solid #ccc;
    }

    .v-step {
      display: flex;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .v-dot {
      width: 0.8vw; height: 0.8vw;
      background: #e0e0e0;
      border-radius: 50%;
      margin-right: 1.2vw;
      flex-shrink: 0;
      /* Add solid border to let dot act as a clean node over the line */
      border: 0.15vw solid #fff;
      box-sizing: content-box;
      margin-left: -0.15vw; /* compensate for border */
    }

    .v-title {
      font-size: 0.9vw;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.01em;
      line-height: 1;
      display: flex;
      align-items: center;
    }

    .v-emoji {
      font-size: 1.5vw;
      margin-right: 0.4vw;
      line-height: 1;
    }

    .v-arrow {
      width: 0.8vw;
      height: 0.8vw;
      background: #fff; /* Masks the line behind it cleanly */
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 2;
    }
    .v-arrow::after {
      content: '';
      width: 0;
      height: 0;
      border-left: 0.25vw solid transparent;
      border-right: 0.25vw solid transparent;
      border-top: 0.4vw solid #ccc;
    }

    /* Column 3: Visual Hook */
    .visual-block {
      flex: 1;
      height: 85%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      position: relative;
    }

    .visual-block img {
      height: 100%;
      width: auto;
      object-fit: contain;
      /* Flip horizontally so the cone points left towards the system */
      transform: scaleX(-1);
    }
    
    /* ── DIVIDER ── */
    .divider { flex-shrink: 0; height: 1px; background: #eee; margin: 0 4vw; }

    /* ── BOTTOM: Full Pipeline iframe ── */
    .bottom {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .bottom iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <!-- TOP: Eye Catcher & Flow -->
  <div class="top">
    
    <!-- Col 1 (Left): Vertical Flow -->
    <div class="flow-block">
      <div class="v-flow-container">
        
        <div class="v-line"></div>
        
        <!-- Outer Loop: Agent to User -->
        <div class="v-loop">
           <div class="v-loop-label">Personalized<br>Response</div>
           <div class="v-loop-arrow"></div>
        </div>

        <!-- Inner Loop: User to Agent Feedback -->
        <div class="v-loop-inner">
           <div class="v-loop-inner-label">Feedback</div>
           <div class="v-loop-inner-arrow"></div>
        </div>

        <div class="v-step">
          <div class="v-dot"></div>
          <div class="v-title"><span class="v-emoji">👤</span> User</div>
        </div>

        <div class="v-arrow"></div>

        <div class="v-step">
          <div class="v-dot"></div>
          <div class="v-title" style="line-height: 1.4;"><span class="v-emoji">📱</span> Capture & Preprocess<br>(Egocentric)</div>
        </div>

        <div class="v-arrow"></div>

        <div class="v-step">
          <div class="v-dot"></div>
          <div class="v-title"><span class="v-emoji">💡</span> VLM Inference</div>
        </div>

        <div class="v-arrow"></div>

        <div class="v-step">
          <div class="v-dot"></div>
          <div class="v-title"><span class="v-emoji">📚</span> Memory Hierarchy</div>
        </div>

        <div class="v-arrow"></div>

        <div class="v-step">
          <div class="v-dot"></div>
          <div class="v-title"><span class="v-emoji">🦞</span> AI Agent (OpenClaw)</div>
        </div>

      </div>
    </div>

    <!-- Background Map (Under Title) -->
    <div class="bg-map">
      <iframe src="/slides/slide-files/39_results_fusion_map.html?clean=1"></iframe>
    </div>

    <!-- Col 2 (Middle): Title -->
    <div class="text-block">
      <h1 class="main-title">Physical-World<br>Observation</h1>
      <p class="subtitle">for Personal AI Agent <span class="highlight">Personalization</span></p>
    </div>

    <!-- Col 3 (Right): Visual Hook -->
    <div class="visual-block">
      <img src="/slides/assets/continuous-capture.svg" alt="Continuous Capture" />
    </div>

  </div>

  <div class="divider"></div>

  <!-- BOTTOM: Full pipeline from slide 25 -->
  <div class="bottom">
    <iframe
      id="pipeline-frame"
      src="/slides/slide-files/25_full_pipeline.html"
    ></iframe>
  </div>

  <script>
    // flowchart.js inside the nested iframe uses getBoundingClientRect() to draw
    // SVG wires. We need to fire resize AFTER layout is stable so coordinates are real.
    const frame = document.getElementById('pipeline-frame');
    frame.addEventListener('load', () => {
      // First attempt immediately
      try { frame.contentWindow.dispatchEvent(new Event('resize')); } catch(e) {}
      // Second attempt after a short delay to let the inner iframe settle
      setTimeout(() => {
        try { frame.contentWindow.dispatchEvent(new Event('resize')); } catch(e) {}
      }, 200);
    });
  </script>

</body>
</html>
