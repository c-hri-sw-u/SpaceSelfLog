<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Roboto', sans-serif;
  width: 100vw;
  height: 100vh;
  background: #fff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 5vw;
  color: #111;
  overflow: hidden;
}

.slide-content {
  display: flex;
  flex-direction: column;
  width: 100%;
}

.header {
  margin-bottom: 2.5vw;
}

h1 {
  font-size: 3.8vw;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 1vw;
}

.intro {
  font-size: 1.4vw;
  font-weight: 400;
  color: #666;
  max-width: 65vw;
  line-height: 1.4;
}

.paper-label.bold {
  color: #111;
  font-weight: 700;
  font-size: 0.75vw;
  z-index: 200;
}

.intro strong {
  color: #111;
  font-weight: 600;
}

.highlight {
  background: #ffe94d;
  padding: 0 0.2vw;
  color: #111;
}

.plot-container {
  width: 100%;
  height: 50vw; /* User can change this freely, contents will scale dynamically! */
  position: relative;
}

body.spread-mode .plot-container {
  height: 64vw; /* Adjust height for spread mode */
}

/* Base Axis classes */
.axis-line {
  position: absolute;
  background: #eee;
}
.axis-h {
  top: 50%; left: 0; width: 100%; height: 2px;
}
.axis-v {
  left: 50%; top: 0; height: 100%; width: 2px;
}

.axis-label {
  position: absolute;
  color: #999;
  font-size: 0.9vw;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  z-index: 100;
}
.axis-label.highlight-axis {
  color: #111;
}

.dot-wrapper {
  position: absolute;
  pointer-events: none;
}

.dot {
  width: 0.6vw;
  height: 0.6vw;
  background: #111;
  border: 0.1vw solid #fff;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.paper-label {
  position: absolute;
  color: #666;
  font-size: 0.75vw;
  font-weight: 400;
  white-space: nowrap;
}

.blind-spot-area {
  position: absolute;
  border: 0.2vw dashed #ffe94d;
  background: rgba(255, 233, 77, 0.2);
  border-radius: 1.25vw;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  filter: drop-shadow(0 0 1vw rgba(255, 233, 77, 0.6));
}

.blind-spot-label {
  color: #111;
  font-size: 1.5vw;
  font-weight: 800 !important;
}
.blind-spot-sub {
  color: #111;
  font-size: 0.9vw;
  font-weight: 600;
}

.research-image {
  position: absolute;
  width: 8vw;
  height: auto;
  border: 0.3vw solid #fff;
  box-shadow: 0 0.5vw 1.5vw rgba(0,0,0,0.15);
  z-index: 10;
  border-radius: 0.2vw;
  transition: transform 0.3s ease;
}

.research-image:hover {
  transform: scale(1.1) rotate(2deg);
  z-index: 100;
}

</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ultra&display=swap" rel="stylesheet">
<style>
  .title, .title-main, .title-sub, h1, h2, .intro-text {
    font-family: 'Ultra', serif !important;
    font-weight: normal !important;
  }
</style>

</head>
<body>

<div class="slide-content" style="height: 100%; align-items: center; justify-content: center;">
  <div class="plot-container" id="pure-plot">
    
    <!-- Axes -->
    <div class="axis-line axis-h"></div>
    <div class="axis-line axis-v"></div>

    <!-- Axes Labels -->
    <div class="axis-label highlight" style="left: 0; top: 50%; transform: translateY(0.5vw);">Digital Traces</div>
    <div class="axis-label highlight highlight-axis" style="right: 0; top: 50%; transform: translateY(0.5vw);">Physical World</div>

    <div class="axis-label highlight" style="left: 50%; bottom: 0; transform: translate(1vw, 0);">Human Memory Aug.</div>
    <div class="axis-label highlight highlight-axis" style="left: 50%; top: 0; transform: translate(1vw, 0);">Agent Personalization</div>

    <!-- Quadrant Area Highlight (The Gap) -->
    <!-- Positioned dynamically using percentages to match the visual region of X: 0.8->1.0, Y: 0.8->1.0 -->
    <div class="blind-spot-area" style="left: 75%; bottom: 75%; width: 20%; height: 20%;">
      <div class="blind-spot-label">This Thesis</div>
      <div class="blind-spot-sub">(The Open Space)</div>
    </div>

    <!-- Research Images -->
    <img src="../assets/img/Memex.jpg" class="research-image" style="left: 24%; bottom: 20%; transform: rotate(-3deg);" alt="Memex">
    <img src="../assets/img/Gordon Bell Mylifebits.jpeg" class="research-image" style="width: 7vw; left: 42%; bottom: -5%; transform: rotate(2deg);" alt="MyLifeBits">
    <img src="../assets/img/Sensecam Image.jpg" class="research-image" style="left: 75%; bottom: 4%; transform: rotate(-2deg);" alt="SenseCam">
    <img src="../assets/img/Ego4D Collage.jpg" class="research-image" style="right: 2%; bottom: 38%; transform: rotate(3deg);" alt="Ego4D">
    <img src="../assets/img/openclaw.jpg" class="research-image" style="left: 1%; top: -5%; width: 8vw; transform: rotate(-3deg);" alt="OpenClaw">
  </div>
</div>

<script>
  async function init() {
    const response = await fetch('../assets/papers.md');
    const text = await response.text();
    
    // Simple Markdown Table Parser
    const lines = text.split('\n');
    const papers = lines
      .filter(line => line.includes('|') && !line.includes('---') && line.trim().startsWith('|'))
      .slice(1) // Skip header
      .map(line => {
        const cols = line.split('|').map(c => c.trim()).filter(c => c !== '');
        const rawTitle = cols[0];
        const x = parseFloat(cols[1]);
        const y = parseFloat(cols[2]);
        const bold = rawTitle.includes('**');
        const title = rawTitle.replace(/\*\*/g, '');
        
        // Manual position overrides (optional: could also be added to markdown columns)
        let pos = null;
        if (title.includes("First-Person Vision")) pos = "right";

        return { title, x, y, bold, pos };
      });

    const plot = document.getElementById('pure-plot');

    papers.forEach((p, i) => {
      // Skip thesis text since it's hardcoded as the large glow frame
      if (p.title.includes("This Thesis")) return;

      let div = document.createElement("div");
      div.className = "dot-wrapper";
      // Mapped mathematically using percentages (5% to 95% to avoid hugging walls exactly)
      div.style.left = `calc(5% + ${p.x * 90}%)`;
      div.style.bottom = `calc(5% + ${p.y * 90}%)`;

      let dot = document.createElement("div");
      dot.className = "dot";

      let text = document.createElement("div");
      text.className = p.bold ? "paper-label bold" : "paper-label";
      text.textContent = p.title;
      
      let xOffset = "0.8vw";
      let yOffset = "0";
      let transformStr = "translateY(-50%)";
      let textAlign = "left";

      // Pure Automatic logic based on edges
      if (p.x > 0.8) {
        xOffset = "-0.8vw";
        transformStr = "translate(-100%, -50%)";
        textAlign = "right";
      }

      // Manual override based on p.pos property
      if (p.pos === "left") {
        xOffset = "-0.8vw";  yOffset = "0";
        transformStr = "translate(-100%, -50%)";
        textAlign = "right";
      } else if (p.pos === "right") {
        xOffset = "0.8vw";   yOffset = "0";
        transformStr = "translateY(-50%)";
        textAlign = "left";
      } else if (p.pos === "top") {
        xOffset = "0";      yOffset = "-0.8vw";
        transformStr = "translate(-50%, -100%)";
        textAlign = "center";
      } else if (p.pos === "bottom") {
        xOffset = "0";      yOffset = "0.8vw";
        transformStr = "translateX(-50%)";
        textAlign = "center";
      }
      
      text.style.left = xOffset;
      text.style.top = yOffset; // Root anchored Y
      text.style.transform = transformStr;
      text.style.textAlign = textAlign;

      div.appendChild(dot);
      div.appendChild(text);
      plot.appendChild(div);
    });
  }

  init().catch(err => console.error("Failed to load papers:", err));
</script>
</body>
</html>
