<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Context → Activity Flow</title>
  <style>
    :root {
      --bg:         #ffffff;
      --text-main:  #111111;
      --text-muted: #888888;
      --border:     #eeeeee;
      --accent:     #ffe94d;

      /* Activity colors are now loaded from theme_config.js */

      /* Location palette */
      --c-office:  #6366f1;
      --c-bedroom: #8b5cf6;
      --c-kitchen: #f97316;
      --c-dining:  #fb923c;
      --c-living:  #a78bfa;
      --c-other:   #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: var(--text-main);
    }

    /* ── SVG canvas ──────────────────────────────────────── */
    #sankey {
      position: absolute;
      inset: 0;
    }

    /* ── Particle canvas (overlay) ───────────────────────── */
    #particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* ── Bottom info ─────────────────────────────────────── */
    #info-block {
      position: absolute;
      bottom: 2vw;
      left: 5vw;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 0.9vw;
    }

    #legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1.6vw;
    }

    .leg-item {
      display: flex;
      align-items: center;
      gap: 0.45vw;
      font-size: 0.75vw;
      color: var(--text-muted);
    }

    .leg-dot {
      width: 0.6vw;
      height: 0.6vw;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .subtitle {
      font-size: 0.9vw;
      color: var(--text-muted);
      max-width: 55vw;
      line-height: 1.5;
    }

    /* ── Tooltip ─────────────────────────────────────────── */
    #tooltip {
      position: absolute;
      pointer-events: none;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.15s ease;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 0.35vw;
      padding: 0.7vw 1vw;
      font-size: 0.85vw;
      box-shadow: 0 0.4vw 1.2vw rgba(0,0,0,0.08);
      min-width: 12vw;
    }

    #tooltip strong {
      display: block;
      font-size: 0.95vw;
      margin-bottom: 0.2vw;
      color: var(--text-main);
    }

    /* ── Loading ─────────────────────────────────────────── */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1vw;
      color: var(--text-muted);
      z-index: 20;
    }
  </style>
  <script src="theme_config.js"></script>
</head>
<body>

  <svg id="sankey"></svg>
  <canvas id="particles"></canvas>

  <div id="info-block">
    <div id="legend">
      <!-- Locations -->
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-office)"></div>Home Office</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-bedroom)"></div>Bedroom</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-kitchen)"></div>Kitchen</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-dining)"></div>Dining Area</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-living)"></div>Living Room</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-other)"></div>Other</div>
      <div class="leg-item" style="width:1.5vw"></div>
      <!-- Activities -->
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-focus)"></div>Focused Work</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-learn)"></div>Learning & Review</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-maint)"></div>Life Maintenance</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-move)"></div>Movement & Transit</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--c-rest)"></div>Rest & Leisure</div>
    </div>
    <p class="subtitle">Each band shows how time logged in a location flows into cognitive activities. Band width = number of log entries.</p>
  </div>

  <div id="tooltip"><strong></strong><span></span></div>
  <div id="loading">Loading…</div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>

  <script>
    // ── Colour helpers ───────────────────────────────────────────
    const CSS = getComputedStyle(document.documentElement);
    const v   = name => CSS.getPropertyValue(name).trim();

    const LOC_COLOR = {
      'Home Office': v('--c-office'),
      'Bedroom':     v('--c-bedroom'),
      'Kitchen':     v('--c-kitchen'),
      'Dining Area': v('--c-dining'),
      'Living Room': v('--c-living'),
      'Other':       v('--c-other'),
    };

    const ACT_COLOR = ACTIVITY_THEME;

    function nodeColor(d) {
      return LOC_COLOR[d.id] || ACT_COLOR[d.id] || '#aaaaaa';
    }

    function nodeName(d) {
      if (ACT_COLOR[d.id]) {
        return getActivityLabel(d.id);
      }
      return d.id;
    }

    // ── Fetch & render ────────────────────────────────────────────
    fetch('/slides/api/sankey')
      .then(r => r.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        render(data);
      })
      .catch(err => {
        document.getElementById('loading').textContent = 'Failed to load data.';
        console.error(err);
      });

    // ── Render ────────────────────────────────────────────────────
    function render({ nodes: rawNodes, links: rawLinks }) {
      const W = window.innerWidth;
      const H = window.innerHeight;
      const PAD = { t: H * 0.134, r: W * 0.248, b: H * 0.254, l: W * 0.248 };

      const svg = d3.select('#sankey')
        .attr('width', W).attr('height', H);

      // ── D3-Sankey layout ──
      const sankey = d3.sankey()
        .nodeId(d => d.id)
        .nodeWidth(W * 0.012)
        .nodePadding(H * 0.032)
        .extent([[PAD.l, PAD.t], [W - PAD.r, H - PAD.b]]);

      // Deep-clone to avoid mutation
      const graph = sankey({
        nodes: rawNodes.map(d => ({ ...d })),
        links: rawLinks.map(d => ({ ...d })),
      });

      // ── Defs: per-link gradient (loc → act) ──
      const defs = svg.append('defs');
      graph.links.forEach((lk, i) => {
        const gid = `lg_${i}`;
        const grad = defs.append('linearGradient')
          .attr('id', gid)
          .attr('gradientUnits', 'userSpaceOnUse')
          .attr('x1', lk.source.x1).attr('x2', lk.target.x0);
        grad.append('stop').attr('offset', '0%')
          .attr('stop-color', nodeColor(lk.source)).attr('stop-opacity', 0.55);
        grad.append('stop').attr('offset', '100%')
          .attr('stop-color', nodeColor(lk.target)).attr('stop-opacity', 0.55);
        lk._gradId = gid;
      });

      // ── Links (bands) ──
      const linkG = svg.append('g').attr('class', 'links');
      const linkSel = linkG.selectAll('path')
        .data(graph.links)
        .join('path')
          .attr('d', d3.sankeyLinkHorizontal())
          .attr('stroke', lk => `url(#${lk._gradId})`)
          .attr('stroke-width', lk => Math.max(1, lk.width))
          .attr('fill', 'none')
          .attr('stroke-opacity', 0.65)
          .style('cursor', 'default');

      // ── Tooltip on links ──
      const tooltip  = document.getElementById('tooltip');
      const ttStrong = tooltip.querySelector('strong');
      const ttSpan   = tooltip.querySelector('span');

      linkSel
        .on('mouseenter', (evt, lk) => {
          ttStrong.textContent = `${lk.source.id} → ${lk.target.id}`;
          ttSpan.textContent   = `${lk.value} log entries`;
          tooltip.style.opacity = '1';
        })
        .on('mousemove', evt => {
          tooltip.style.left = `${evt.clientX + 14}px`;
          tooltip.style.top  = `${evt.clientY - 14}px`;
        })
        .on('mouseleave', () => { tooltip.style.opacity = '0'; });

      // ── Nodes (rectangles) ──
      const nodeG = svg.append('g').attr('class', 'nodes');
      const nodeGroups = nodeG.selectAll('g')
        .data(graph.nodes)
        .join('g');

      nodeGroups.append('rect')
        .attr('x', d => d.x0)
        .attr('y', d => d.y0)
        .attr('width',  d => d.x1 - d.x0)
        .attr('height', d => Math.max(1, d.y1 - d.y0))
        .attr('fill', nodeColor)
        .attr('rx', 2);

      // ── Node labels ──
      const isRight = d => d.x0 > W / 2;

      nodeGroups.append('text')
        .attr('x',  d => isRight(d) ? d.x1 + W * 0.012 : d.x0 - W * 0.012)
        .attr('y',  d => (d.y0 + d.y1) / 2)
        .attr('text-anchor', d => isRight(d) ? 'start' : 'end')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', `${W * 0.0085}px`)
        .attr('font-weight', '500')
        .attr('fill', d => nodeColor(d))
        .text(d => nodeName(d));

      // ── Value labels (entry count) ──
      nodeGroups.append('text')
        .attr('x',  d => isRight(d) ? d.x1 + W * 0.012 : d.x0 - W * 0.012)
        .attr('y',  d => (d.y0 + d.y1) / 2 + H * 0.022)
        .attr('text-anchor', d => isRight(d) ? 'start' : 'end')
        .attr('dominant-baseline', 'middle')
        .attr('font-size', `${W * 0.0065}px`)
        .attr('font-weight', '400')
        .attr('fill', '#bbbbbb')
        .text(d => `${d.value} entries`);

      // ── Particle animation ────────────────────────────────────
      const canvas = document.getElementById('particles');
      canvas.width  = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');

      // Each particle belongs to a link and has a t ∈ [0,1]
      const PARTICLES_PER_LINK = 6;
      const particles = [];

      // Compute a point along a sankey link path at t ∈ [0,1]
      // We approximate by sampling the SVG path using getTotalLength
      const pathEls = linkSel.nodes();
      graph.links.forEach((lk, i) => {
        const pathEl = pathEls[i];
        const len = pathEl.getTotalLength();
        for (let p = 0; p < PARTICLES_PER_LINK; p++) {
          particles.push({
            lk,
            pathEl,
            len,
            t:     Math.random(),          // current progress [0,1]
            speed: 0.0015 + Math.random() * 0.001,
            r:     1.5 + Math.random() * 2,
            srcColor: nodeColor(lk.source),
            tgtColor: nodeColor(lk.target),
          });
        }
      });

      function lerpColor(c1, c2, t) {
        const a = d3.color(c1).rgb();
        const b = d3.color(c2).rgb();
        return `rgba(${Math.round(a.r + (b.r - a.r) * t)},${Math.round(a.g + (b.g - a.g) * t)},${Math.round(a.b + (b.b - a.b) * t)},0.85)`;
      }

      function animate() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => {
          p.t += p.speed;
          if (p.t > 1) p.t = 0;

          const pt  = p.pathEl.getPointAtLength(p.t * p.len);
          const clr = lerpColor(p.srcColor, p.tgtColor, p.t);
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = clr;
          ctx.fill();
        });
        requestAnimationFrame(animate);
      }
      animate();
    }
  </script>

</body>
</html>
