<!DOCTYPE html>
<html lang="en">

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <meta charset="UTF-8">
  <title>Dynamic Time-Mapped Photo Wall</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Roboto', sans-serif;
      width: 100vw;
      height: 100vh;
      background: #000000;
      color: #fff;
      overflow: hidden;
    }

    #controls-area {
      position: absolute;
      top: 0;
      right: 0;
      padding: 1vw 2vw 5vw 5vw;
      /* large invisible padding for easier hovers */
      z-index: 100;
    }

    #controls-area::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 15vw;
      height: 15vw;
      /* Invisible hover activation block stuck to the top corner */
    }

    #controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(30, 30, 30, 0.85);
      padding: 15px 25px;
      border-radius: 8px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      width: 320px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-20px) scale(0.95);
      transform-origin: top right;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #controls-area:hover #controls {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #controls label {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
    }

    input[type="range"] {
      cursor: pointer;
      accent-color: #3b82f6;
      width: 130px;
    }

    input[type="datetime-local"] {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 4px;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
    }

    #container {
      width: 100vw;
      height: 100vh;
      padding: 2vw;
      position: relative;
    }

    #inner {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(17, 17, 17, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 0.5s;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    .progress-text {
      font-size: 18px;
      letter-spacing: 1px;
    }

    .progress-bar-bg {
      margin-top: 15px;
      width: 300px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fg {
      width: 0%;
      height: 100%;
      background: #3b82f6;
      transition: width 0.1s;
    }



    .fake-cursor-dot { display: none; }
    .fake-cursor-dot.visible { display: block; }
    .fake-cursor-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255, 225, 60, 0.92);
      border: 2px solid rgba(255,255,255,0.95);
      cursor: grab;
      transform: translate(-50%, -50%);
      z-index: 50;
      box-shadow: 0 0 0 3px rgba(255,200,0,0.35), 0 2px 8px rgba(0,0,0,0.7);
      pointer-events: auto;
      transition: box-shadow 0.15s ease;
    }
    .fake-cursor-dot:hover { box-shadow: 0 0 0 5px rgba(255,200,0,0.5), 0 2px 10px rgba(0,0,0,0.8); }
    .fake-cursor-dot.dragging { cursor: grabbing; box-shadow: 0 0 0 7px rgba(255,200,0,0.4), 0 4px 14px rgba(0,0,0,0.9); }
  </style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ultra&display=swap" rel="stylesheet">
<style>
  .title, .title-main, .title-sub, h1, h2, .intro-text {
    font-family: 'Ultra', serif !important;
    font-weight: normal !important;
  }
</style>

</head>

<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="progress-text">Processing Space-Time Data <span id="progress-count">0</span> / <span
        id="total-count">...</span></div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fg" id="progress-bar"></div>
    </div>
  </div>

  <div id="controls-area">
    <div id="controls">
      <div class="control-row">
        <label>Start</label>
        <input type="datetime-local" id="start-date">
      </div>
      <div class="control-row">
        <label>End</label>
        <input type="datetime-local" id="end-date">
      </div>
      <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 5px 0;" />
      <div class="control-row">
        <label for="overlap">Base Overlap: <span id="overlap-val">30</span>%</label>
        <input type="range" id="overlap" min="0" max="95" value="30">
      </div>
      <div class="control-row">
        <label for="max-gap">Max Time Cap: <span id="max-gap-val">3</span>h</label>
        <input type="range" id="max-gap" min="1" max="72" value="3" step="0.5">
      </div>
      <div class="control-row">
        <label for="max-dist">Max Visual Dist: <span id="max-dist-val">10</span>x</label>
        <input type="range" id="max-dist" min="1" max="200" value="10">
      </div>
      <div class="control-row">
        <label for="hover-n">Hover Radius: <span id="hover-n-val">3</span></label>
        <input type="range" id="hover-n" min="0" max="15" value="3">
      </div>
    </div>
  </div>

  <div id="container">
    <div id="inner">
      <canvas id="wall"></canvas>
      <canvas id="overlay"></canvas>
      <div id="fake-cursor" class="fake-cursor-dot"></div>
      <div id="fake-cursor-2" class="fake-cursor-dot"></div>
    </div>
  </div>

  <script>
    // ── Pagination params ─────────────────────────────────────────
    const _urlParams = new URLSearchParams(window.location.search);
    const PAGE_INDEX  = parseInt(_urlParams.get('pg')  ?? '0', 10);  // 0-based page index
    const PAGE_COUNT  = parseInt(_urlParams.get('pgs') ?? '1', 10);  // total pages
    const IS_PAGED    = PAGE_COUNT > 1;
    const IS_LEADER   = !IS_PAGED || PAGE_INDEX === 0;  // only pg=0 shows the controls

    // Hide controls panel on follower pages
    if (!IS_LEADER) {
      document.getElementById('controls-area').style.display = 'none';
    }

    let ALL_IMAGES = []; // {url, ts}
    let FILTERED_IMAGES = [];
    let normalizedGaps = [];

    let loadedBitmaps = new Map();
    let loadedColors = new Map();
    let aspectRatio = 4 / 3;
    let isCanvasReady = false;

    const canvas = document.getElementById('wall');
    const ctx = canvas.getContext('2d', { alpha: false });
    const overlayCanvas = document.getElementById('overlay');
    const oCtx = overlayCanvas.getContext('2d');

    const innerDiv = document.getElementById('inner');
    const loadingOverlay = document.getElementById('loading-overlay');

    let hoverIndex = -1;          // compat (slides mode)
    let hoverIndices = [-1, -1];  // per-dot hover index (spread mode)
    let hiResImages  = [null, null];
    let cachedLayoutPoses = [];
    let cachedW = 0; let cachedH = 0; let cachedOffsetY = 0;

    const startDateInput = document.getElementById('start-date');
    const endDateInput = document.getElementById('end-date');
    const overlapSlider = document.getElementById('overlap');
    const overlapVal = document.getElementById('overlap-val');
    const maxGapSlider = document.getElementById('max-gap');
    const maxGapVal = document.getElementById('max-gap-val');
    const maxDistSlider = document.getElementById('max-dist');
    const maxDistVal = document.getElementById('max-dist-val');
    const hoverNSlider = document.getElementById('hover-n');
    const hoverNVal = document.getElementById('hover-n-val');
    const toggleBtn = document.getElementById('controls-toggle');
    const controlsPanel = document.getElementById('controls');

    function resizeCanvas() {
      const rect = innerDiv.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);

      overlayCanvas.width = rect.width * dpr;
      overlayCanvas.height = rect.height * dpr;
      oCtx.scale(dpr, dpr);

      if (isCanvasReady) calculateAndApplyLayout();
    }
    window.addEventListener('resize', resizeCanvas);

    function loadThumbnail(url, targetWidth) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = async () => {
          const isPortrait = img.naturalHeight > img.naturalWidth;
          const off = document.createElement('canvas');

          if (isPortrait) {
            // Rotate 90° CW: portrait (W×H) → landscape (H×W)
            const scale = targetWidth / img.naturalHeight;  // fit the long side into targetWidth
            off.width  = targetWidth;                                        // = H * scale
            off.height = Math.round(img.naturalWidth * scale);               // = W * scale
            const c = off.getContext('2d');
            c.translate(off.width, 0);   // move origin to top-right corner
            c.rotate(Math.PI / 2);       // 90° CW: x-axis now points down
            c.drawImage(img, 0, 0, off.height, off.width); // draw in rotated space
          } else {
            const scale = targetWidth / img.width;
            off.width  = targetWidth;
            off.height = Math.round(img.height * scale);
            const c = off.getContext('2d');
            c.drawImage(img, 0, 0, off.width, off.height);
          }

          try {
            const bmp = await createImageBitmap(off);
            resolve(bmp);
          } catch (e) { resolve(off); }
        };
        img.onerror = reject;
        img.src = url;
      });
    }

    // Format local date for input[type=datetime-local]
    function toDTLocal(ts) {
      const d = new Date(ts);
      return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    }

    function recalculateDataFilters() {
      const startMs = startDateInput.value ? new Date(startDateInput.value).getTime() : -Infinity;
      const endMs = endDateInput.value ? new Date(endDateInput.value).getTime() : Infinity;

      let all = ALL_IMAGES.filter(img => img.ts >= startMs && img.ts <= endMs);

      // ── Slice to the current page ──
      if (IS_PAGED) {
        const chunkSize = Math.ceil(all.length / PAGE_COUNT);
        const start = PAGE_INDEX * chunkSize;
        all = all.slice(start, start + chunkSize);
      }

      FILTERED_IMAGES = all;

      const N = FILTERED_IMAGES.length;
      normalizedGaps = [];
      if (N === 0) return;

      const BASE_GAP_MS = 12000; // Expected baseline capture interval
      const currentMaxGapMs = parseFloat(maxGapSlider.value) * 3600 * 1000;
      const maxDistanceMult = parseFloat(maxDistSlider.value);

      for (let i = 0; i < N; i++) {
        if (i === 0) {
          normalizedGaps.push(1);
        } else {
          let diffMs = FILTERED_IMAGES[i].ts - FILTERED_IMAGES[i - 1].ts;
          if (diffMs <= BASE_GAP_MS) {
            normalizedGaps.push(1);
          } else {
            let clamped = Math.min(diffMs, currentMaxGapMs);
            if (currentMaxGapMs <= BASE_GAP_MS) {
              normalizedGaps.push(maxDistanceMult); // Degenerate case fallback
            } else {
              let fraction = (clamped - BASE_GAP_MS) / (currentMaxGapMs - BASE_GAP_MS);
              let multiplier = 1 + fraction * (maxDistanceMult - 1);
              normalizedGaps.push(multiplier);
            }
          }
        }
      }
    }

    // ── sessionStorage key for metadata cache (shared across all pages of this wall) ──
    const _CACHE_KEY = 'photowall_all_images_v1';

    async function init() {
      try {
        resizeCanvas();

        // ── Fix 2: try sessionStorage cache first to skip API re-fetch on back-nav ──
        let cachedRaw = sessionStorage.getItem(_CACHE_KEY);
        if (cachedRaw) {
          try { ALL_IMAGES = JSON.parse(cachedRaw); } catch(e) { ALL_IMAGES = []; }
        }

        if (ALL_IMAGES.length === 0) {
          const res = await fetch('/slides/api/frames');
          const data = await res.json();
          ALL_IMAGES = data.images || [];
          // Cache for same-session re-navigation
          try { sessionStorage.setItem(_CACHE_KEY, JSON.stringify(ALL_IMAGES)); } catch(e) {}
        }

        if (ALL_IMAGES.length === 0) { loadingOverlay.innerHTML = "No frames found."; return; }

        // Restore saved configs if available
        if (localStorage.getItem('config-overlap')) overlapSlider.value = localStorage.getItem('config-overlap');
        if (localStorage.getItem('config-max-gap')) maxGapSlider.value = localStorage.getItem('config-max-gap');
        if (localStorage.getItem('config-max-dist')) maxDistSlider.value = localStorage.getItem('config-max-dist');
        if (localStorage.getItem('config-hover-n')) hoverNSlider.value = localStorage.getItem('config-hover-n');

        const N_ALL = ALL_IMAGES.length;
        const defaultStart = toDTLocal(ALL_IMAGES[0].ts);
        const defaultEnd   = toDTLocal(ALL_IMAGES[N_ALL - 1].ts);
        startDateInput.value = localStorage.getItem('config-start-date') || defaultStart;
        endDateInput.value   = localStorage.getItem('config-end-date')   || defaultEnd;

        // ── Fix 1: slice to this page BEFORE loading any thumbnails ──
        recalculateDataFilters();  // populates FILTERED_IMAGES (this page's chunk only)

        const PAGE_IMAGES = FILTERED_IMAGES; // alias for clarity
        const N = PAGE_IMAGES.length;
        document.getElementById('total-count').innerText = N;

        if (N === 0) { loadingOverlay.innerHTML = "No frames found for this page."; return; }

        // Probe aspect ratio from the GLOBAL first image (consistent across all pages).
        // Cache in sessionStorage so follower pages skip the network request.
        const _AR_KEY = 'photowall_aspect_ratio_v1';
        const _cachedAR = parseFloat(sessionStorage.getItem(_AR_KEY) || '0');
        if (_cachedAR > 0.1) {
          aspectRatio = _cachedAR;
        } else {
          await new Promise((resolve) => {
            const firstImg = new Image();
            firstImg.onload = () => {
              aspectRatio = firstImg.naturalWidth / firstImg.naturalHeight;
              // Ensure landscape — if somehow portrait, flip
              if (aspectRatio < 1) aspectRatio = 1 / aspectRatio;
              try { sessionStorage.setItem(_AR_KEY, String(aspectRatio)); } catch(e) {}
              resolve();
            };
            firstImg.onerror = resolve;
            firstImg.src = ALL_IMAGES[0].url;  // global reference, not slice-local
          });
        }

        // ── Concurrent worker pool — only loads THIS PAGE's thumbnails ──
        let loaded = 0, currentIndex = 0;
        const workers = Array(60).fill(0).map(async () => {
          while (currentIndex < N) {
            const idx = currentIndex++;
            const imgObj = PAGE_IMAGES[idx];
            try {
              const bmp = await loadThumbnail(imgObj.url, 64);
              loadedBitmaps.set(imgObj.url, bmp);

              // Extract average color of right-most edge for gap filling
              const tmpCanvas = document.createElement('canvas');
              tmpCanvas.width = 1; tmpCanvas.height = 1;
              const tCtx = tmpCanvas.getContext('2d', { willReadFrequently: true });
              tCtx.drawImage(bmp, bmp.width - 1, 0, 1, bmp.height, 0, 0, 1, 1);
              const data = tCtx.getImageData(0, 0, 1, 1).data;
              loadedColors.set(imgObj.url, { r: data[0], g: data[1], b: data[2] });

            } catch (e) { }

            loaded++;
            if (loaded % 15 === 0) {
              document.getElementById('progress-count').innerText = loaded;
              document.getElementById('progress-bar').style.width = (loaded / N * 100) + '%';
              if (loaded % 300 === 0) {
                isCanvasReady = true;
                calculateAndApplyLayout();
              }
            }
          }
        });
        await Promise.all(workers);

        isCanvasReady = true;
        loadingOverlay.style.opacity = '0';
        setTimeout(() => loadingOverlay.style.display = 'none', 500);
        calculateAndApplyLayout();
      } catch (err) {
        console.error(err);
        loadingOverlay.innerHTML = "<div style='color:red'>Data Loading Failed.</div>";
      }
    }

    // Mathematical timeline tracker 
    // Given a test 'w', returns exactly what X, Y and which Row all images land on.
    function getLayoutPositions(w, W, P, h, G, offsetY) {
      let x = 0, r = 0;
      let poses = [];
      const N = FILTERED_IMAGES.length;
      for (let i = 0; i < N; i++) {
        let gap = normalizedGaps[i] * w * (1 - P);
        if (i > 0) {
          if (x + gap + w > W) {
            let span = x + gap;
            r += Math.floor(span / W);
            x = span % W;
            // If after unwinding exact distance it clips edge, force bump down
            if (x !== 0 && x + w > W) {
              r++; x = 0;
            }
          } else {
            x += gap;
          }
        }
        poses.push({ x, y: offsetY + r * (h + G), r: r });
      }
      return { R: r + 1, poses };
    }

    function renderInnerShadow(rx, ry, rw, rh) {
      if (rw <= 2 || rh <= 2) return;
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(0,0,0,0.6)';
      ctx.strokeRect(rx + 0.5, ry + 0.5, rw - 1, rh - 1);
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.strokeRect(rx + 1.5, ry + 1.5, rw - 3, rh - 3);
      ctx.strokeStyle = 'rgba(0,0,0,0.1)';
      ctx.strokeRect(rx + 2.5, ry + 2.5, rw - 5, rh - 5);
    }

    function drawGap(xA, rA, xB, rB, w, h, W, G, offsetY, color) {
      if (rA > rB) return;

      const drawBlock = (rx, ry, rw, rh) => {
        if (rw <= 0 || rh <= 0) return;
        ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, 0.5)`;
        ctx.fillRect(rx, ry, rw, rh);
        renderInnerShadow(rx, ry, rw, rh);
      };

      if (rA === rB) {
        let empty_x_start = xA + w;
        let empty_width = xB - empty_x_start;
        if (empty_width > 0.5) {
          drawBlock(empty_x_start, offsetY + rA * (h + G), empty_width, h);
        }
      } else {
        // Fill remaining part of line A
        if (xA + w < W - 0.5) {
          drawBlock(xA + w, offsetY + rA * (h + G), W - (xA + w), h);
        }
        // Fill all intermediate full lines
        for (let r = rA + 1; r < rB; r++) {
          drawBlock(0, offsetY + r * (h + G), W, h);
        }
        // Fill line B start
        if (xB > 0.5) {
          drawBlock(0, offsetY + rB * (h + G), xB, h);
        }
      }
    }

    function calculateAndApplyLayout(limitRender = Infinity) {
      if (!isCanvasReady) return;

      // Refresh parameters
      const P = parseInt(overlapSlider.value, 10) / 100;
      overlapVal.innerText = parseInt(overlapSlider.value, 10);
      maxGapVal.innerText = maxGapSlider.value;
      maxDistVal.innerText = maxDistSlider.value;
      hoverNVal.innerText = hoverNSlider.value;

      const rect = innerDiv.getBoundingClientRect();
      const W = rect.width;
      // In paged mode use full height; otherwise reserve space for top label
      const TOP_RESERVED_SPACE = IS_PAGED ? 0 : 20;
      const H = rect.height - TOP_RESERVED_SPACE;
      const A = aspectRatio;
      const G = window.innerWidth * 0.01;

      const N = FILTERED_IMAGES.length;

      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, W, rect.height);

      if (N === 0) return;

      // Numerical Bisection Search to pinpoint max W that rigidly binds all bounds
      let low = 0.1;
      let high = W;
      let optW = 0.1;

      for (let step = 0; step < 50; step++) {
        let w_mid = (low + high) / 2;
        // dummy H and G to just retrieve Row count
        let layout = getLayoutPositions(w_mid, W, P, 0, 0, 0);
        let curH = layout.R * (w_mid / A) + (layout.R - 1) * G;

        if (curH <= H) {
          optW = w_mid;
          low = w_mid;
        } else {
          high = w_mid;
        }
      }

      const w = optW;
      const h = w / A;

      // Perform final geometry assignment and paint
      let layout = getLayoutPositions(w, W, P, h, G, 0);
      let totalHeightUsed = (layout.R * h) + (layout.R - 1) * G;
      let emptyVertSpace = Math.max(0, H - totalHeightUsed);
      let offsetY = TOP_RESERVED_SPACE + (emptyVertSpace / 2);

      // Draw all timeline gap backgrounds first
      const renderCount = Math.min(limitRender, N);
      for (let i = 1; i < renderCount; i++) {
        const urlA = FILTERED_IMAGES[i - 1].url;
        const colorA = loadedColors.get(urlA);
        if (!colorA) continue;

        const posA = layout.poses[i - 1];
        const posB = layout.poses[i];

        drawGap(posA.x, posA.r, posB.x, posB.r, w, h, W, G, offsetY, colorA);
      }

      ctx.globalAlpha = 0.5;

      let currentDayStr = null;

      for (let i = 0; i < renderCount; i++) {
        const imgObj = FILTERED_IMAGES[i];
        const bmp = loadedBitmaps.get(imgObj.url);
        if (!bmp) continue;

        const pos = layout.poses[i];

        ctx.globalAlpha = 0.5;
        ctx.drawImage(bmp, pos.x, pos.y + offsetY, w, h);

        ctx.globalAlpha = 1.0;
        renderInnerShadow(pos.x, pos.y + offsetY, w, h);

        // Render New Date Annotations
        const d = new Date(imgObj.ts);
        const mStr = String(d.getMonth() + 1).padStart(2, '0');
        const dStr = String(d.getDate()).padStart(2, '0');
        const dayID = mStr + '/' + dStr;

        if (dayID !== currentDayStr) {
          currentDayStr = dayID;
          const hStr = String(d.getHours()).padStart(2, '0');
          const textStr = `${mStr}/${dStr}/${hStr}`;

          const baseScale = W / 1600;
          const fontSize10 = baseScale * 10;
          ctx.globalAlpha = 0.5;
          ctx.font = `bold ${fontSize10}px 'Courier New', Courier, monospace`;
          ctx.textAlign = "left";

          const textY = pos.y + offsetY - (5 * baseScale);

          const tWidth = ctx.measureText(textStr).width;

          // Draw text background backing for readability across gaps
          ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
          ctx.fillRect(pos.x, textY - (9 * baseScale), tWidth + (6 * baseScale), 12 * baseScale);

          // Draw text
          ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
          ctx.fillText(textStr, pos.x + (3 * baseScale), textY + (1 * baseScale));

          // Revert opacity for next image draws
          ctx.globalAlpha = 0.5;
        }
      }
      ctx.globalAlpha = 1.0;

      // ── Page indicator (paged mode only) ──────────────────────
      if (IS_PAGED) {
        const baseScale = W / 1600;
        const label = `${PAGE_INDEX + 1} / ${PAGE_COUNT}`;
        const fs = baseScale * 11;
        ctx.font = `500 ${fs}px 'Roboto', sans-serif`;
        ctx.globalAlpha = 0.45;
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'right';
        ctx.fillText(label, W - baseScale * 12, rect.height - baseScale * 10);
        ctx.textAlign = 'left';
        ctx.globalAlpha = 1.0;
      }

      // Save metric state for overlay hit detection
      cachedLayoutPoses = layout.poses;
      cachedW = w;
      cachedH = h;
      cachedOffsetY = offsetY;
      oCtx.save(); oCtx.setTransform(1, 0, 0, 1, 0, 0); oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height); oCtx.restore();
      hoverIndex = -1;
      hoverIndices = [-1, -1]; hiResImages = [null, null];
    }

    // ── Shared hover logic ─────────────────────────────────────────────────
    let fakeCursorDragging = false;

    function findNearestIdx(mx, my) {
      let found = -1, minD = Infinity;
      const n = Math.min(FILTERED_IMAGES.length, cachedLayoutPoses.length);
      for (let i = 0; i < n; i++) {
        const pos = cachedLayoutPoses[i];
        const d = (mx - pos.x - cachedW/2) ** 2 + (my - pos.y - cachedOffsetY - cachedH/2) ** 2;
        if (d < minD) { minD = d; found = i; }
      }
      return found;
    }

    function buildDock(imgIdx, rect) {
      if (imgIdx === -1) return [];
      const pos = cachedLayoutPoses[imgIdx];
      const cyRaw = pos.y + cachedOffsetY;
      const scaleMax = 3.5, hoverN = parseInt(hoverNSlider.value, 10), GAP = 2;
      let items = [], total = 0;
      for (let k = -hoverN; k <= hoverN; k++) {
        const ti = imgIdx + k;
        if (ti < 0 || ti >= FILTERED_IMAGES.length) continue;
        let s = 1.0 + (scaleMax-1.0) * Math.pow(1-Math.abs(k)/(hoverN+1), 1.5);
        let w = cachedW * s;
        if (w > rect.width * 0.35) { s = (rect.width*0.35)/cachedW; w = cachedW*s; }
        items.push({ idx: ti, k, s, w, h: cachedH*s });
        total += w;
      }
      total += Math.max(0, items.length-1) * GAP;
      const center = items.find(it => it.k === 0);
      if (!center) return [];
      let leftW = 0; for (const it of items) if (it.k < 0) leftW += it.w + GAP;
      let sx = pos.x + cachedW/2 - leftW - center.w/2;
      if (sx < 10) sx = 10;
      if (sx + total > rect.width - 10) sx = rect.width - total - 10;
      let cx = sx;
      for (const it of items) {
        it.x = cx; it.y = cyRaw + cachedH/2 - it.h/2;
        if (it.y < 35) it.y = 35;
        if (it.y + it.h > rect.height - 10) it.y = rect.height - it.h - 10;
        cx += it.w + GAP;
      }
      items.sort((a,b) => a.s - b.s);
      return items;
    }

    function renderAllOverlays() {
      const rect = innerDiv.getBoundingClientRect();
      const bs = rect.width / 1600;
      oCtx.save(); oCtx.setTransform(1,0,0,1,0,0); oCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height); oCtx.restore();
      // Draw both docks (one per dot)
      for (let di = 0; di < 2; di++) {
        const imgIdx = hoverIndices[di];
        if (imgIdx === -1) continue;
        for (const it of buildDock(imgIdx, rect)) {
          const imgObj = FILTERED_IMAGES[it.idx];
          const bmp = (it.k === 0 && hiResImages[di]) ? hiResImages[di] : loadedBitmaps.get(imgObj.url);
          if (!bmp) continue;
          oCtx.shadowColor='rgba(0,0,0,0.85)'; oCtx.shadowBlur=10*bs*it.s; oCtx.shadowOffsetX=0; oCtx.shadowOffsetY=5*bs*it.s; oCtx.globalAlpha=1.0;
          oCtx.drawImage(bmp, it.x, it.y, it.w, it.h);
          oCtx.shadowColor='transparent'; oCtx.strokeStyle='rgba(255,255,255,0.9)'; oCtx.lineWidth=bs+it.s*0.2;
          oCtx.strokeRect(it.x, it.y, it.w, it.h);
          if (it.k === 0) {
            const d = new Date(imgObj.ts);
            const ts = `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
            oCtx.font=`bold ${bs*13}px 'Courier New',monospace`;
            const tW=oCtx.measureText(ts).width, tx=it.x+it.w/2-tW/2, ty=it.y-28*bs;
            oCtx.fillStyle='rgba(0,0,0,0.85)'; oCtx.fillRect(tx-10*bs,ty,tW+20*bs,22*bs);
            oCtx.fillStyle='rgba(255,255,255,1)'; oCtx.fillText(ts,tx,ty+15*bs);
          }
        }
      }
    }

    function applyHoverAt(mx, my, dotIdx = 0) {
      if (!isCanvasReady || cachedLayoutPoses.length === 0) return;
      const found = findNearestIdx(mx, my);
      if (found === hoverIndices[dotIdx]) return;
      hoverIndices[dotIdx] = found;
      hiResImages[dotIdx] = null;
      // For slides-mode compat, mirror into legacy hoverIndex
      if (dotIdx === 0) hoverIndex = found;
      renderAllOverlays();
      if (found === -1) return;
      const di = dotIdx, snap = found;
      const img = new Image();
      img.onload = () => {
        if (hoverIndices[di] === snap) { hiResImages[di] = img; renderAllOverlays(); }
      };
      img.src = FILTERED_IMAGES[found].url.replace('thumbnails-data','frames-data');
    }

    innerDiv.addEventListener('mousemove', (e) => {
      if (fakeCursorDragging || PAGE_COUNT === 3) return;  // disabled in spread mode
      const rect = innerDiv.getBoundingClientRect();
      applyHoverAt(e.clientX - rect.left, e.clientY - rect.top);
    });

    innerDiv.addEventListener('mouseleave', () => {
      if (fakeCursorDragging || PAGE_COUNT === 3) return;
      oCtx.save(); oCtx.setTransform(1,0,0,1,0,0); oCtx.clearRect(0,0,overlayCanvas.width,overlayCanvas.height); oCtx.restore();
      hoverIndex = -1; hoverIndices = [-1,-1];
    });

    const inputs = [overlapSlider, maxGapSlider, maxDistSlider, startDateInput, endDateInput, hoverNSlider];

    if (IS_LEADER) {
      // Leader page: write changes to localStorage (other pages will pick them up)
      inputs.forEach(el => {
        el.addEventListener('input', () => {
          localStorage.setItem('config-' + el.id, el.value);
          if (el.id === 'start-date' || el.id === 'end-date' || el.id === 'max-gap' || el.id === 'max-dist') {
            recalculateDataFilters();
          }
          requestAnimationFrame(() => calculateAndApplyLayout());
        });
      });
    }

    // All pages (including leader) listen for config changes written by the leader
    window.addEventListener('storage', (e) => {
      if (!e.key || !e.key.startsWith('config-')) return;
      const id = e.key.replace('config-', '');
      const el = document.getElementById(id);
      if (el && e.newValue !== null) el.value = e.newValue;
      if (id === 'start-date' || id === 'end-date' || id === 'max-gap' || id === 'max-dist') {
        recalculateDataFilters();
      }
      requestAnimationFrame(() => calculateAndApplyLayout());
    });

    init().then(() => {
      // Fake cursors only in spread mode (pgs=3)
      if (PAGE_COUNT !== 3) return;

      const dots = [
        document.getElementById('fake-cursor'),
        document.getElementById('fake-cursor-2'),
      ];
      dots.forEach(d => d.classList.add('visible'));

      // Track which dot is being dragged (null = none)
      let activeDot = null;

      function randomImagePos() {
        if (cachedLayoutPoses.length === 0) return null;
        const idx = Math.floor(Math.random() * cachedLayoutPoses.length);
        const pos = cachedLayoutPoses[idx];
        return { px: pos.x + cachedW / 2, py: pos.y + cachedOffsetY + cachedH / 2 };
      }

      function placeDot(el, px, py) {
        el.style.left = px + 'px';
        el.style.top  = py + 'px';
      }

      // Wait for layout, then place both dots at different random positions
      const _t = setInterval(() => {
        if (isCanvasReady && cachedLayoutPoses.length > 0) {
          clearInterval(_t);
          const N = cachedLayoutPoses.length;
          const i1 = Math.floor(N * 0.25 + Math.random() * N * 0.15);
          const i2 = Math.floor(N * 0.60 + Math.random() * N * 0.15);
          [i1, i2].forEach((idx, di) => {
            const pos = cachedLayoutPoses[Math.min(idx, N-1)];
            const px = pos.x + cachedW / 2;
            const py = pos.y + cachedOffsetY + cachedH / 2;
            placeDot(dots[di], px, py);
            applyHoverAt(px, py, di);  // each dot triggers its own overlay
          });
        }
      }, 120);

      dots.forEach(el => {
        el.addEventListener('mousedown', (e) => {
          activeDot = el;
          fakeCursorDragging = true;
          el.classList.add('dragging');
          e.preventDefault(); e.stopPropagation();
        });
      });

      window.addEventListener('mousemove', (e) => {
        if (!activeDot) return;
        const r = innerDiv.getBoundingClientRect();
        const px = Math.max(0, Math.min(r.width,  e.clientX - r.left));
        const py = Math.max(0, Math.min(r.height, e.clientY - r.top));
        placeDot(activeDot, px, py);
        applyHoverAt(px, py, dots.indexOf(activeDot));  // pass which dot
      });

      window.addEventListener('mouseup', () => {
        if (activeDot) {
          activeDot.classList.remove('dragging');
          activeDot = null;
          fakeCursorDragging = false;
        }
      });
    });
  </script>
</body>

</html>
