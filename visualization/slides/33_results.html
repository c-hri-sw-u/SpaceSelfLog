<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      width: 100vw;
      height: 100vh;
      background: #FAE032;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .visual-container {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .lobster-img {
      width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      object-position: right center;
      position: absolute;
      z-index: 10;
    }

    .intro-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 8vw;
      font-weight: 700;
      color: rgba(255, 255, 255, 1);
      z-index: 100;
      letter-spacing: -0.05em;
      pointer-events: none;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      white-space: nowrap;
    }
  </style>
</head>

<body>

  <div class="visual-container">
    <img src="../assets/lobster_results.png" alt="Results Lobster" class="lobster-img">
    <div class="intro-text">RESULTS</div>
  </div>

</body>

</html>
