<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceSelfLog — Slides</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Roboto', sans-serif;
    background: #1a1a1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: #fff;
  }

  /* ── Top toolbar ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: #111;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
    user-select: none;
  }

  #slide-counter {
    font-size: 13px;
    color: #888;
    min-width: 70px;
  }

  .tb-btn {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #ddd;
    padding: 5px 14px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .tb-btn:hover { background: #3a3a3a; }
  .tb-btn:disabled { opacity: 0.3; cursor: default; }

  .tb-btn.primary {
    background: #2c5f8a;
    border-color: #3a7abf;
    color: #fff;
  }
  .tb-btn.primary:hover { background: #3570a0; }

  .tb-btn.danger {
    background: #5a1a1a;
    border-color: #8a3333;
    color: #ffaaaa;
  }
  .tb-btn.danger:hover { background: #6a2020; }

  #toolbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  #save-status {
    font-size: 12px;
    color: #555;
    min-width: 80px;
    text-align: right;
  }
  #save-status.saved  { color: #4a8a4a; }
  #save-status.saving { color: #8a7a3a; }

  /* ── Meta fields ── */
  #meta-bar {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 8px 48px;
    flex-shrink: 0;
  }

  #section-name {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    width: 80px;
    min-width: 10px;
  }
  #section-name::placeholder { color: #444; }

  #section-sizer {
    position: absolute;
    visibility: hidden;
    white-space: pre;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'Roboto', sans-serif;
    pointer-events: none;
  }

  #meta-divider {
    color: #555;
    font-size: 20px;
    flex-shrink: 0;
    user-select: none;
  }

  #subtitle {
    font-size: 18px;
    font-weight: 300;
    color: #fff;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    flex: 1;
  }
  #subtitle::placeholder { color: #444; }

  /* ── Body row (sidebar + main) ── */
  #body-row {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 200px;
    min-width: 200px;
    background: #111;
    border-right: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.22s ease, min-width 0.22s ease;
  }
  #sidebar.collapsed {
    width: 0;
    min-width: 0;
    border-right: none;
  }

  /* ── Script Sidebar (Right) ── */
  #script-sidebar {
    width: 320px;
    min-width: 320px;
    background: #111;
    border-left: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.22s ease, min-width 0.22s ease;
  }
  #script-sidebar.collapsed {
    width: 0;
    min-width: 0;
    border-left: none;
  }

  #script-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 8px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
    flex-shrink: 0;
    background: #0a0a0a;
    border-bottom: 1px solid #222;
  }

  #script-editor {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #ccc;
    font-family: 'SF Mono', Monaco, Consolas, 'Liberation Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 16px;
    resize: none;
    width: 100%;
  }
  #script-editor::placeholder { color: #333; }
  #script-editor::-webkit-scrollbar { width: 6px; }
  #script-editor::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
  #script-editor::-webkit-scrollbar-thumb:hover { background: #333; }

  #sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px 8px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
    flex-shrink: 0;
    white-space: nowrap;
  }

  #sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #sidebar-list::-webkit-scrollbar { width: 4px; }
  #sidebar-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .thumb {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 3px;
    cursor: pointer;
    padding: 0;
    overflow: hidden;
    transition: border-color 0.12s;
    flex-shrink: 0;
  }
  .thumb:hover { border-color: #555; }
  .thumb.active { border-color: #2a2a2a; }
  .thumb.active .thumb-preview { outline: 2px solid #4a90c4; outline-offset: -2px; }

  .thumb-preview {
    background: #fff;
    width: 100%;
    aspect-ratio: 16 / 9;
    position: relative;
    overflow: hidden;
  }

  .thumb-iframe {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1600px;
    height: 900px;
    border: none;
    pointer-events: none;
    /* Transformation is applied in JS via translate(-50%, -50%) scale(...) */
  }

  .thumb-meta {
    padding: 5px 7px 6px;
  }
  .thumb-section {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #aaa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .thumb-subtitle {
    font-size: 10px;
    font-weight: 300;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }
  .thumb-num {
    font-size: 9px;
    color: #fff;
    margin-top: 2px;
  }

  /* ── Toggle button ── */
  #btn-sidebar {
    font-size: 13px;
    padding: 5px 10px;
  }

  /* ── Main area ── */
  #main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 48px;
    overflow: hidden;
    transition: padding 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }

  #main.wide-active {
    overflow: visible;
    padding: 16px 12px;
  }

  /* ── Slide ── */
  #slide {
    background: #111;
    width: 100%;
    max-width: calc((100vh - 140px) * 16 / 9);
    aspect-ratio: 16 / 9;
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    overflow: hidden;
    position: relative;  /* needed for keep-alive iframes */
    transition: max-width 0.55s cubic-bezier(0.34, 1.56, 0.64, 1),
                aspect-ratio 0.55s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.55s ease;
  }

  /* Wide mode: spans ~2 slides worth of width (32:9) */
  #slide.wide {
    max-width: calc((100vh - 140px) * 32 / 9);
    aspect-ratio: 32 / 9;
    box-shadow: 0 12px 80px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.04);
  }

  /* Custom aspect-ratio mode (e.g. 3.25/2.75 for research poster images) */
  #slide.custom-ratio {
    /* aspect-ratio and max-width are set inline by JS */
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  #slide-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Nav arrows */
  .nav-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.06);
    border: none;
    color: #555;
    font-size: 26px;
    width: 36px;
    height: 80px;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-arrow:hover { background: rgba(255,255,255,0.14); color: #ddd; }
  .nav-arrow:disabled { opacity: 0.12; cursor: default; }
  #nav-prev { left: 6px; }
  #nav-next { right: 6px; }

  /* ── Spread Mode ── */
  #spread-container {
    display: none;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    width: 100%;
    height: 100%;
    padding: 40px;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a1a;
  }
  #spread-container.active {
    display: flex;
  }
  .spread-row {
    display: flex;
    justify-content: center;
    width: 100%;
    max-width: 1600px;
    margin-bottom: 40px;
    flex-shrink: 0;
  }
  .spread-page {
    flex: 1;
    aspect-ratio: 11 / 8.5;
    background: #111;
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.04);
    container-type: inline-size;
  }
  .spread-page.empty {
    background: transparent;
    box-shadow: none;
    border: none;
  }
  .spread-page.wide-page {
    flex: 0 0 100%;
    aspect-ratio: 22 / 8.5;
  }
  .spread-page iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  .page-number {
    position: absolute;
    bottom: 3cqw;
    font-size: 1.2cqw;
    font-weight: 500;
    color: #777;
    z-index: 10;
    font-family: 'Roboto', sans-serif;
    pointer-events: none;
  }
  .page-number.left-page { left: 3cqw; }
  .page-number.right-page { right: 3cqw; }
  
  .spread-page.wide-page .page-number {
    bottom: 1.5cqw;
    font-size: 0.6cqw;
  }
  .spread-page.wide-page .page-number.left-page { left: 1.5cqw; }
  .spread-page.wide-page .page-number.right-page { right: 1.5cqw; }
  
  @media screen {
    .spread-page:not(.empty).is-left::after {
      content: ""; position: absolute; top: 0; right: 0; bottom: 0;
      width: 4%; background: rgba(255, 0, 0, 0.15); pointer-events: none; z-index: 50;
    }
    .spread-page:not(.empty).is-right::after {
      content: ""; position: absolute; top: 0; left: 0; bottom: 0;
      width: 4%; background: rgba(255, 0, 0, 0.15); pointer-events: none; z-index: 50;
    }
    .spread-page.wide-page::after {
      content: ""; position: absolute; top: 0; left: 48%; bottom: 0;
      width: 4%; background: rgba(255, 0, 0, 0.15); pointer-events: none; z-index: 50;
    }
  }
  
  @media print {
    body { background: white !important; }
    #toolbar, #meta-bar, #sidebar, #script-sidebar, .nav-arrow { display: none !important; }
    #body-row, #main {
      display: block !important;
      height: auto !important;
      overflow: visible !important;
    }
    #slide { display: none !important; }
    #spread-container.active {
      display: block !important;
      position: static !important;
      padding: 0 !important;
      overflow: visible !important;
      height: auto !important;
      background: white !important;
    }
    .spread-row {
      margin-bottom: 0 !important;
      max-width: 100% !important;
      page-break-inside: avoid;
      break-inside: avoid;
      page-break-after: always;
    }
    .spread-page {
      box-shadow: none !important;
      border: none !important;
      background: white !important;
    }
    .page-number { color: #888 !important; }
  }
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ultra&display=swap" rel="stylesheet">
<style>
  .title, .title-main, .title-sub, h1, h2, .intro-text {
    font-family: 'Ultra', serif !important;
    font-weight: normal !important;
  }
</style>

</head>
<body>

<div id="toolbar">
  <button class="tb-btn" id="btn-sidebar" title="Toggle slide panel">&#9776;</button>
  <button class="tb-btn" id="btn-mode-toggle" title="Toggle spread mode">Spreads</button>
  <span id="slide-counter">1 / 1</span>
  <button class="tb-btn" id="btn-prev" disabled>&#8592; Prev</button>
  <button class="tb-btn" id="btn-next" disabled>Next &#8594;</button>
  <button class="tb-btn primary" id="btn-add">+ Add Slide</button>
  <button class="tb-btn danger" id="btn-delete">Delete</button>
  <div id="toolbar-right">
    <span id="save-status"></span>
    <button class="tb-btn" id="btn-refresh" title="Refresh current slide">&#8635;</button>
    <button class="tb-btn" id="btn-script-toggle" title="Toggle script panel">Script</button>
  </div>
</div>

<div id="meta-bar">
  <span id="section-sizer"></span>
  <input id="section-name" type="text" placeholder="SECTION" spellcheck="false" />
  <span id="meta-divider">|</span>
  <input id="subtitle" type="text" placeholder="Slide title or subtitle…" spellcheck="false" />
</div>

<div id="body-row">
  <div id="sidebar">
    <div id="sidebar-header"><span>Slides</span></div>
    <div id="sidebar-list"></div>
  </div>

  <div id="main">
    <div id="slide">
      <iframe id="slide-frame" src="about:blank"></iframe>
    </div>
    <div id="spread-container"></div>
  </div>

  <div id="script-sidebar">
    <div id="script-header"><span>Script / Notes</span></div>
    <textarea id="script-editor" placeholder="Write slide script here..." spellcheck="false"></textarea>
  </div>
</div>

<button class="nav-arrow" id="nav-prev" disabled>&#8249;</button>
<button class="nav-arrow" id="nav-next" disabled>&#8250;</button>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let slides  = [{ section: "", subtitle: "", src: "/slides/slide-files/01_cover.html" }];
let current = 0;
let saveTimer   = null;
let sidebarOpen = true;
let scriptSidebarOpen = true;
let isSpreadMode = false;

// ── DOM refs ───────────────────────────────────────────────────────────────
const sectionEl    = document.getElementById("section-name");
const sectionSizer = document.getElementById("section-sizer");
const subtitleEl   = document.getElementById("subtitle");
const counterEl    = document.getElementById("slide-counter");
const saveStatusEl = document.getElementById("save-status");
const btnPrev      = document.getElementById("btn-prev");
const btnNext      = document.getElementById("btn-next");
const btnAdd       = document.getElementById("btn-add");
const btnDelete    = document.getElementById("btn-delete");
const btnModeToggle= document.getElementById("btn-mode-toggle");
const btnSidebar   = document.getElementById("btn-sidebar");
const navPrev      = document.getElementById("nav-prev");
const navNext      = document.getElementById("nav-next");
const sidebar      = document.getElementById("sidebar");
const sidebarList  = document.getElementById("sidebar-list");
const scriptSidebar = document.getElementById("script-sidebar");
const scriptEditor  = document.getElementById("script-editor");
const btnScriptToggle = document.getElementById("btn-script-toggle");
const slideFrame   = document.getElementById("slide-frame");
const spreadContainer = document.getElementById("spread-container");

// ── Mode-filtered slide indices ────────────────────────────────────────────
function getVisible() {
  return slides
    .map((s, i) => i)
    .filter(i => isSpreadMode ? !slides[i].slidesOnly : !slides[i].spreadOnly);
}

// ── Sidebar toggle ─────────────────────────────────────────────────────────
btnSidebar.addEventListener("click", () => {
  sidebarOpen = !sidebarOpen;
  sidebar.classList.toggle("collapsed", !sidebarOpen);
});

btnModeToggle.addEventListener("click", () => {
  isSpreadMode = !isSpreadMode;
  localStorage.setItem("isSpreadMode", isSpreadMode);
  btnModeToggle.textContent = isSpreadMode ? "Slides" : "Spreads";
  btnModeToggle.classList.toggle("primary", isSpreadMode);

  // Snap current to nearest valid entry for the new mode
  const visible = getVisible();
  if (visible.length > 0 && !visible.includes(current)) {
    current = visible.reduce((best, v) =>
      Math.abs(v - current) < Math.abs(best - current) ? v : best, visible[0]);
  }

  if (isSpreadMode) {
    slideEl.style.display = "none";
    spreadContainer.classList.add("active");
    renderSpreads();
  } else {
    slideEl.style.display = "";
    spreadContainer.classList.remove("active");
    spreadContainer.innerHTML = "";
  }
  render();
});

function renderSpreads() {
  spreadContainer.innerHTML = "";
  
  let currentRow = document.createElement("div");
  currentRow.className = "spread-row";
  
  // The first slide (cover) is always Page 1 on the right.
  let emptyLeft = document.createElement("div");
  emptyLeft.className = "spread-page empty is-left";
  currentRow.appendChild(emptyLeft);
  
  let nextSlot = 'right';
  
  // Filter out slides marked for slidesOnly
  const spreadVisible = slides.map((s, i) => i).filter(i => !slides[i].slidesOnly);
  
  let physicalPageCounter = 1;
  
  for (let vi = 0; vi < spreadVisible.length; vi++) {
    const i = spreadVisible[vi];
    let s = slides[i];
    
    if (s.wide) {
      if (nextSlot === 'right' && vi > 0) {
        let emptyRight = document.createElement("div");
        emptyRight.className = "spread-page empty is-right";
        currentRow.appendChild(emptyRight);
        spreadContainer.appendChild(currentRow);
        currentRow = document.createElement("div");
        currentRow.className = "spread-row";
      }
      
      let widePage = document.createElement("div");
      widePage.className = "spread-page wide-page";
      let iframe = document.createElement("iframe");
      iframe.src = s.src;
      iframe.onload = function() {
        try {
          if (this.contentDocument && this.contentDocument.body) {
            this.contentDocument.body.classList.add("spread-mode");
          }
        } catch(e) {}
      };
      widePage.appendChild(iframe);
      
      if (vi > 0) {
        let pNumL = document.createElement("div");
        pNumL.className = "page-number left-page";
        pNumL.textContent = physicalPageCounter;
        widePage.appendChild(pNumL);
        
        let pNumR = document.createElement("div");
        pNumR.className = "page-number right-page";
        pNumR.textContent = physicalPageCounter + 1;
        widePage.appendChild(pNumR);
      }
      physicalPageCounter += 2;

      currentRow.appendChild(widePage);
      spreadContainer.appendChild(currentRow);
      
      currentRow = document.createElement("div");
      currentRow.className = "spread-row";
      nextSlot = 'left';
      
    } else {
      let page = document.createElement("div");
      page.className = "spread-page " + (nextSlot === 'left' ? 'is-left' : 'is-right');
      if (s.aspectRatio) {
        page.style.aspectRatio = s.aspectRatio;
        page.classList.add('custom-ratio');
      }
      
      let iframe = document.createElement("iframe");
      iframe.src = s.src;
      iframe.onload = function() {
        try {
          if (this.contentDocument && this.contentDocument.body) {
            this.contentDocument.body.classList.add("spread-mode");
          }
        } catch(e) {}
      };
      page.appendChild(iframe);
      
      if (vi > 0) {
        let pNum = document.createElement("div");
        pNum.className = "page-number " + (nextSlot === 'left' ? 'left-page' : 'right-page');
        pNum.textContent = physicalPageCounter;
        page.appendChild(pNum);
      }
      
      physicalPageCounter += 1;
      currentRow.appendChild(page);
      
      if (nextSlot === 'left') {
        nextSlot = 'right';
      } else {
        spreadContainer.appendChild(currentRow);
        currentRow = document.createElement("div");
        currentRow.className = "spread-row";
        nextSlot = 'left';
      }
    }
  }
  
  // Close the last row if it only has one page
  if (nextSlot === 'right' && currentRow.children.length === 1) {
    let emptyRight = document.createElement("div");
    emptyRight.className = "spread-page empty is-right";
    currentRow.appendChild(emptyRight);
    spreadContainer.appendChild(currentRow);
  } else if (nextSlot === 'left' && currentRow.children.length === 0) {
    // empty row, ignore
  } else if (currentRow.children.length > 0) {
    // If there's something in the row but it wasn't appended (e.g. wide page logic already appended)
    if (!currentRow.parentElement) spreadContainer.appendChild(currentRow);
  }
}

btnScriptToggle.addEventListener("click", () => {
  scriptSidebarOpen = !scriptSidebarOpen;
  scriptSidebar.classList.toggle("collapsed", !scriptSidebarOpen);
  btnScriptToggle.classList.toggle("primary", scriptSidebarOpen);
});

// ── Thumbnails ─────────────────────────────────────────────────────────────
function renderSidebar() {
  const visible = getVisible();

  // Rebuild DOM if count changed (mode switch or slide add/delete)
  if (sidebarList.children.length !== visible.length) {
    const st = sidebarList.scrollTop;
    sidebarList.innerHTML = "";
    let availableW = sidebarList.clientWidth;
    if (availableW < 50) availableW = 196;
    const thumbW = availableW - 18;
    const scale  = thumbW / 1600;

    visible.forEach((slideIdx, pos) => {
      const s = slides[slideIdx];
      const div = document.createElement("div");
      div.className = "thumb";

      const preview = document.createElement("div");
      preview.className = "thumb-preview";
      if (s.keepAlive) {
        // Static placeholder — avoid triggering a full page load just for a thumbnail
        preview.style.cssText = "background:#0d0d0d;display:flex;align-items:center;justify-content:center;";
        const lbl = document.createElement("span");
        lbl.style.cssText = "font-size:9px;color:#444;text-align:center;padding:4px;pointer-events:none;";
        lbl.textContent = s.subtitle || "—";
        preview.appendChild(lbl);
      } else if (s.src && s.src !== "about:blank") {
        const f = document.createElement("iframe");
        f.className = "thumb-iframe";
        f.src = s.src;
        f.style.transform = `translate(-50%, -50%) scale(${scale})`;
        preview.appendChild(f);
      }

      const meta = document.createElement("div");
      meta.className = "thumb-meta";
      meta.innerHTML = `
        <div class="thumb-section" style="display:none"></div>
        <div class="thumb-subtitle"></div>
        <div class="thumb-num"></div>`;

      div.appendChild(preview);
      div.appendChild(meta);
      div.addEventListener("click", () => goTo(slideIdx));
      sidebarList.appendChild(div);
    });
    sidebarList.scrollTop = st;
  }

  // Fast metadata update
  const thumbs = sidebarList.children;
  visible.forEach((slideIdx, pos) => {
    const s = slides[slideIdx];
    const t = thumbs[pos];
    if (!t) return;
    t.className = "thumb" + (slideIdx === current ? " active" : "");

    const sectEl = t.querySelector(".thumb-section");
    if (s.section) {
      sectEl.style.display = "";
      sectEl.textContent = s.section;
    } else {
      sectEl.style.display = "none";
    }

    t.querySelector(".thumb-subtitle").innerHTML = s.subtitle || "<em style='color:#555'>untitled</em>";
    t.querySelector(".thumb-num").textContent = pos + 1;
  });
}

// ── Slide element ref ──────────────────────────────────────────────────────
const slideEl = document.getElementById("slide");

// ── Keep-alive iframe cache (src → iframe element) ─────────────────────────
const keepAliveMap = new Map();

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const s = slides[current];
  sectionEl.value  = s.section  || "";
  subtitleEl.value = s.subtitle || "";
  scriptEditor.value = s.script || "";
  resizeSection();

  if (s.keepAlive) {
    // ── Keep-alive slide: create once, show/hide on subsequent visits ──
    const src = s.src || "about:blank";
    let kIframe = keepAliveMap.get(src);
    if (!kIframe) {
      kIframe = document.createElement("iframe");
      kIframe.style.cssText = "position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:block;";
      kIframe.src = src;
      slideEl.appendChild(kIframe);
      keepAliveMap.set(src, kIframe);
    }
    // Hide normal frame + all other cached iframes, show this one
    slideFrame.style.display = "none";
    keepAliveMap.forEach((iframe, iSrc) => {
      iframe.style.display = iSrc === src ? "block" : "none";
    });
  } else {
    // ── Normal slide: use the shared slideFrame ──
    slideFrame.style.display = "";
    keepAliveMap.forEach(iframe => { iframe.style.display = "none"; });
    slideFrame.src = s.src || "about:blank";
    slideFrame.onload = () => {
      if (slideFrame.contentWindow) {
        slideFrame.contentWindow.postMessage({ type: 'script-update', script: s.script || "" }, "*");
      }
    };
  }

  const visible = getVisible();
  const visPos  = visible.indexOf(current);
  counterEl.textContent = `${visPos + 1} / ${visible.length}`;

  const hasPrev = visPos > 0;
  const hasNext = visPos < visible.length - 1;

  if (isSpreadMode) {
    btnPrev.disabled   = true;
    btnNext.disabled   = true;
    navPrev.style.display = "none";
    navNext.style.display = "none";
    btnDelete.disabled = true;
    btnAdd.disabled    = true;
  } else {
    btnPrev.disabled   = !hasPrev;
    btnNext.disabled   = !hasNext;
    navPrev.style.display = "";
    navNext.style.display = "";
    navPrev.disabled   = !hasPrev;
    navNext.disabled   = !hasNext;
    btnDelete.disabled = slides.length <= 1;
    btnAdd.disabled    = false;
  }

  // Wide mode: if the current slide has wide:true, expand to double-width
  const isWide = !!s.wide;
  slideEl.classList.toggle("wide", isWide);
  document.getElementById("main").classList.toggle("wide-active", isWide);

  // Custom aspect ratio mode (e.g. "3.25/2.75" for research image slides)
  if (s.aspectRatio && !isWide) {
    const [w, h] = s.aspectRatio.split('/').map(Number);
    slideEl.classList.add('custom-ratio');
    slideEl.style.aspectRatio = s.aspectRatio;
    slideEl.style.maxWidth = `calc((100vh - 140px) * ${w} / ${h})`;
  } else if (!isWide) {
    slideEl.classList.remove('custom-ratio');
    slideEl.style.aspectRatio = '';
    slideEl.style.maxWidth = '';
  }

  renderSidebar();
}

function resizeSection() {
  sectionSizer.textContent = sectionEl.value || sectionEl.placeholder;
  sectionEl.style.width = sectionSizer.offsetWidth + "px";
}

// ── Edit handlers ──────────────────────────────────────────────────────────
sectionEl.addEventListener("input", () => {
  slides[current].section = sectionEl.value;
  resizeSection();
  scheduleSave();
  renderSidebar();
});

subtitleEl.addEventListener("input", () => {
  slides[current].subtitle = subtitleEl.value;
  scheduleSave();
  renderSidebar();
});

scriptEditor.addEventListener("input", () => {
  const text = scriptEditor.value;
  slides[current].script = text;
  scheduleSave();
  
  // Sync to iframe
  if (slideFrame.contentWindow) {
    slideFrame.contentWindow.postMessage({ type: 'script-update', script: text }, "*");
  }
});

// ── Navigation ─────────────────────────────────────────────────────────────
function goTo(idx) {
  // Snap to nearest visible entry in current mode
  const visible = getVisible();
  if (visible.length === 0) return;
  if (!visible.includes(idx)) {
    idx = visible.reduce((best, v) =>
      Math.abs(v - idx) < Math.abs(best - idx) ? v : best, visible[0]);
  }
  current = idx;
  render();
  const thumbs = sidebarList.querySelectorAll(".thumb");
  if (thumbs[current]) thumbs[current].scrollIntoView({ block: "nearest", behavior: "smooth" });
}

function navStep(delta) {
  const visible = getVisible();
  const pos = visible.indexOf(current);
  const next = pos + delta;
  if (next >= 0 && next < visible.length) goTo(visible[next]);
}

btnPrev.addEventListener("click",  () => navStep(-1));
btnNext.addEventListener("click",  () => navStep(+1));
navPrev.addEventListener("click",  () => navStep(-1));
navNext.addEventListener("click",  () => navStep(+1));

document.addEventListener("keydown", e => {
  if (e.target === sectionEl || e.target === subtitleEl) return;
  if (e.key === "ArrowLeft")  navStep(-1);
  if (e.key === "ArrowRight") navStep(+1);
});

// ── Add / Delete ───────────────────────────────────────────────────────────
btnAdd.addEventListener("click", async () => {
  btnAdd.disabled = true;
  try {
    const res  = await fetch("/slides/api/slides/new", { method: "POST" });
    const data = await res.json();
    const newSlide = { section: slides[current]?.section || "", subtitle: "", src: data.src };
    slides.splice(current + 1, 0, newSlide);
    current += 1;
    render();
    subtitleEl.focus();
    scheduleSave();
  } finally {
    btnAdd.disabled = false;
  }
});

btnDelete.addEventListener("click", () => {
  if (slides.length <= 1) return;
  slides.splice(current, 1);
  current = Math.min(current, slides.length - 1);
  render();
  scheduleSave();
});

// ── Persistence ────────────────────────────────────────────────────────────
function scheduleSave() {
  saveStatusEl.textContent = "unsaved";
  saveStatusEl.className   = "";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveSlides, 800);
}

async function saveSlides() {
  saveStatusEl.textContent = "saving…";
  saveStatusEl.className   = "saving";
  try {
    await fetch("/slides/api/slides", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ slides }),
    });
    saveStatusEl.textContent = "saved";
    saveStatusEl.className   = "saved";
    setTimeout(() => { if (saveStatusEl.className === "saved") saveStatusEl.textContent = ""; }, 2000);
  } catch {
    saveStatusEl.textContent = "save failed";
    saveStatusEl.className   = "";
  }
}

async function loadSlides() {
  try {
    const res  = await fetch("/slides/api/slides");
    const data = await res.json();
    if (data.slides && data.slides.length > 0) {
      slides  = data.slides;
      current = 0;
    }
  } catch { /* use defaults */ }
  render();
}

// ── Refresh ────────────────────────────────────────────────────────────────
document.getElementById("btn-refresh").addEventListener("click", () => {
  const src = slideFrame.src;
  slideFrame.src = "about:blank";
  requestAnimationFrame(() => { slideFrame.src = src; });
});

// ── Restore on Cmd+R / Ctrl+R ─────────────────────────────────────────────
window.addEventListener("beforeunload", () => {
  sessionStorage.setItem("slides_current", current);
});

// ── Init ───────────────────────────────────────────────────────────────────
loadSlides().then(() => {
  const restored = sessionStorage.getItem("slides_current");
  if (restored !== null) {
    const idx = parseInt(restored, 10);
    if (!isNaN(idx) && idx < slides.length) goTo(idx);
    sessionStorage.removeItem("slides_current");
  }
  
  if (localStorage.getItem("isSpreadMode") === "true") {
    btnModeToggle.click();
  }
});
</script>
</body>
</html>
