<!DOCTYPE html>
<html lang="en">

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Roboto', sans-serif;
      width: 100vw;
      height: 100vh;
      background: #FAE032;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .visual-container {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .lobster-img {
      width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      object-position: right center;
      position: absolute;
      z-index: 10;
    }

    .intro-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 8vw;
      font-weight: 700;
      color: rgba(255, 255, 255, 1);
      z-index: 100;
      letter-spacing: -0.05em;
      pointer-events: none;
      font-family: 'Roboto', sans-serif;
      white-space: nowrap;
    }
  </style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ultra&display=swap" rel="stylesheet">
<style>
  .title, .title-main, .title-sub, h1, h2, .intro-text {
    font-family: 'Ultra', serif !important;
    font-weight: normal !important;
  }
</style>

</head>

<body>

  <div class="visual-container">
    <img src="../assets/lobster_results.png" alt="Results Lobster" class="lobster-img">
    <div class="intro-text">RESULTS</div>
  </div>

</body>

</html>
