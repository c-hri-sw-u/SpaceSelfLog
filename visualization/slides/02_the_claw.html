<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Roboto', sans-serif;
  width: 100vw;
  height: 100vh;
  background: #FAE032;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
}

.visual-container {
  width: 100%;
  height: 100%;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  overflow: visible;
}

.keyboard {
  width: 65vw;
  height: auto;
  position: absolute;
  z-index: 5;
  top: 0%;
  left: 5%;
}

.claw {
  width: auto;
  height: 120vh;
  position: absolute;
  bottom: -20%;
  right: 0%;
  z-index: 10;
  /* Horizontal flip + slight lean into the keyboard for 'typing' action */
  transform: scaleX(-1) rotate(-15deg);
  transform-origin: bottom center;
  pointer-events: none;
  /* Add a stroke to the claw content using multiple drop-shadows */
  filter: drop-shadow(1px 0 0 #fff) 
          drop-shadow(-1px 0 0 #fff) 
          drop-shadow(0 1px 0 #fff) 
          drop-shadow(0 -1px 0 #fff);
}

.intro-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 8vw;
  font-weight: 700;
  color: rgba(255, 255, 255, 1);
  z-index: 100;
  letter-spacing: -0.05em;
  pointer-events: none;
  font-family: 'Roboto', sans-serif;
}
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ultra&display=swap" rel="stylesheet">
<style>
  .title, .title-main, .title-sub, h1, h2, .intro-text {
    font-family: 'Ultra', serif !important;
    font-weight: normal !important;
  }
</style>

</head>
<body>

<div class="visual-container">
  <div class="intro-text">INTRO</div>
  <img src="../assets/img/keyboard_transparent.png" alt="Keyboard" class="keyboard">
  <img src="../assets/img/claw_transparent.png" alt="The Claw" class="claw">
</div>

</body>
</html>
