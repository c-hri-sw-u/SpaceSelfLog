<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Integrated Spatial Activity Map</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --text-muted: #888888;
      --border: #f0f0f0;
      --sidebar-w: 18vw;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #111;
    }

    #layout {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* ── Sidebars (Floating Overlays) ──────────────── */
    .sidebar {
      position: absolute;
      top: 1.5vw;
      width: var(--sidebar-w);
      max-height: 94vh;
      padding: 1.2vw;
      z-index: 50;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      overflow-y: auto;
    }

    .sidebar-left {
      left: 2vw;
    }

    .sidebar-right {
      right: 2vw;
    }

    .sidebar-title {
      font-size: 0.75vw;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 1.5vw;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5vw;
    }

    .room-card {
      margin-bottom: 2vw;
      opacity: 0;
      transform: translateY(15px);
    }

    .room-card.visible {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5vw;
    }

    .card-name {
      font-size: 0.95vw;
      font-weight: 600;
    }

    .card-total {
      font-size: 0.75vw;
      color: var(--text-muted);
    }

    .chart-box {
      display: flex;
      align-items: center;
      gap: 1vw;
    }

    .donut-svg {
      width: 3.2vw;
      height: 3.2vw;
    }

    .chart-legend {
      flex: 1;
      list-style: none;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 0.35vw;
      font-size: 0.75vw;
      color: #444;
      margin-bottom: 0.1vw;
    }

    .leg-mark {
      width: 0.5vw;
      height: 0.5vw;
      border-radius: 1px;
      flex-shrink: 0;
    }

    /* ── Map Container (Centered) ──────────────────── */
    #map-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    #plan-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
    }

    .plan-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Room Labels (Inside Map) ──────────────────── */
    .room-label {
      position: absolute;
      pointer-events: none;
      text-align: center;
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }

    .room-label .r-name {
      font-weight: 600;
      line-height: 1.1;
    }

    .room-label .r-count {
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 0.15em;
    }

    /* ── Bottom Legend (Categorical) ────────────────── */
    #info-block {
      position: absolute;
      bottom: 2vw;
      right: 4vw;
      z-index: 60;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.9vw;
    }

    #legend {
      display: flex;
      gap: 1.8vw;
      align-items: center;
      justify-content: flex-end;
    }

    .leg-item {
      display: flex;
      align-items: center;
      gap: 0.4vw;
      font-size: 0.75vw;
      color: var(--text-muted);
    }

    .leg-dot {
      width: 0.6vw;
      height: 0.6vw;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .leg-bar {
      width: 3.5vw;
      height: 0.55vw;
      border-radius: 2px;
      flex-shrink: 0;
      background: linear-gradient(to right, #fef3c7, #f97316, #dc2626);
    }

    .subtitle {
      font-size: 0.9vw;
      color: var(--text-muted);
      max-width: 55vw;
      line-height: 1.5;
      text-align: right;
    }

    /* ── Tooltip ──────────────────────────────────── */
    #tooltip {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      background: #fff;
      border: 1px solid var(--border);
      padding: 0.5em 0.8em;
      font-size: 0.8vw;
      border-radius: 4px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .07);
      z-index: 200;
      transition: opacity 0.2s;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      z-index: 100;
      font-size: 1vw;
      color: var(--text-muted);
    }
  </style>
  <script src="theme_config.js"></script>
</head>

<body>

  <div id="layout">
    <!-- Left Overlay: Common / Life -->
    <aside class="sidebar sidebar-left">
      <div class="sidebar-title">Public Areas</div>
      <div id="left-cards"></div>
    </aside>

    <main id="map-container">

            d="M269.5 427H229.5V347H269.5V427ZM279.989 387.984C282.554 380.99 292.446 380.99 295.011 387.984L296.188 391.193C297.717 395.365 298.5 399.774 298.5 404.217C298.5 406.306 296.806 408 294.717 408H293.5V410C297.918 410 301.5 413.582 301.5 418V425C301.5 426.105 300.605 427 299.5 427H275.5C274.395 427 273.5 426.105 273.5 425V418C273.5 413.582 277.082 410 281.5 410V408H280.283C278.194 408 276.5 406.306 276.5 404.217C276.5 399.774 277.283 395.365 278.812 391.193L279.989 387.984ZM350.5 427H305.5V398H350.5V427ZM100.5 360C117.069 360 130.5 373.431 130.5 390V396C130.5 412.569 117.069 426 100.5 426H94.5C77.9315 426 64.5 412.569 64.5 396V390C64.5 373.431 77.9315 360 94.5 360H100.5ZM203.5 426H131.5V408H203.5V426ZM33.5 343H15.5V325H33.5V343ZM203.5 335H131.5V299H203.5V335ZM33.5 324H15.5V292H33.5V324ZM121.5 281H113.5V249H121.5V281ZM166.5 281H122.5V249H166.5V281ZM211.5 281H167.5V249H211.5V281ZM220.5 281H212.5V249H220.5V281ZM50.5 255H8.5V155H50.5V255ZM166.5 248H113.5V236H166.5V248ZM220.5 248H167.5V236H220.5V248ZM596.5 237H564.5V165H596.5V237ZM181.5 235H107.5V201H181.5V235ZM220.5 235H197.5V197H220.5V235ZM70.5 220H57.5V217H70.5V220ZM69.5 216H51.5V198H69.5V216ZM76.5 216H70.5V198H76.5V216ZM554.5 214H541.5V211H554.5V214ZM541.5 210H535.5V192H541.5V210ZM560.5 210H542.5V192H560.5V210ZM70.5 197H57.5V194H70.5V197ZM554.5 191H541.5V188H554.5V191ZM118.5 175H100.5V169H118.5V175ZM118.5 168H100.5V150H118.5V168ZM596.5 164H524.5V132H596.5V164ZM130.5 146H88.5V74H130.5V146ZM319.5 104H357.5V136H229.5V104H279.5V101H319.5V104ZM65.5 135H59.5V117H65.5V135ZM84.5 135H66.5V117H84.5V135ZM152.5 135H134.5V117H152.5V135ZM159.5 135H153.5V117H159.5V135ZM596.5 131H494.5V60H596.5V131ZM24.5 58H17.5V106H24.5V108H8.5V106H15.5V58H8.5V56H24.5V58ZM65.5 103H59.5V85H65.5V103ZM84.5 103H66.5V85H84.5V103ZM152.5 103H134.5V85H152.5V103ZM159.5 103H153.5V85H159.5V103ZM118.5 70H100.5V52H118.5V70ZM220.5 56H200.5V8H220.5V56ZM357.5 40H269.5V56H229.5V8H357.5V40ZM118.5 51H100.5V45H118.5V51ZM379.5 48H365.5V8H379.5V48ZM199.5 32H1         </svg>

        <canvas id="heat-canvas" class="plan-layer"
          style="position:absolute;top:0;left:0;pointer-events:none;"></canvas>
        <canvas id="movement-canvas" class="plan-layer"></canvas>

        <svg id="hit-layer" class="plan-layer" viewBox="0 0 605 434" preserveAspectRatio="xMidYMid meet"
          style="pointer-events:all;">
          <g id="hit-zones"></g>
        </svg>

        <div id="labels-layer" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></div>
      </div>

      <!-- Bottom Legend (Categorical) -->
      <div id="info-block">
        <div id="legend"></div>
        <p class="subtitle">Integrated Activity Map: Room glow indicates dominant behavior. Sidebars show
          high-resolution breakdown per zone.</p>
      </div>
    </main>

    <!-- Right Overlay -->
    <aside class="sidebar sidebar-right">
      <div class="sidebar-title">Private & Work</div>
      <div id="right-cards"></div>
    </aside>
  </div>

  <div id="tooltip"><strong></strong><span></span></div>
  <div id="loading">Fusing Spatial & Categorical Data...</div>

  <script>
    const SVG_W = 605, SVG_H = 434;
    const CONFIG = {
      rooms: {
        dining_area: { sidebar: 'left', label: 'Dining Area', api: 'Dining Area', center: { x: 115, y: 80 }, shape: { type: 'path', d: 'M7.5 7L221.5 7V175H7.5V7Z' } },
        kitchen: { sidebar: 'left', label: 'Kitchen', api: 'Kitchen', center: { x: 294, y: 72 }, shape: { type: 'rect', x: 229.5, y: 7, w: 128, h: 129 } },
        living_room: { sidebar: 'left', label: 'Living Room', api: 'Living Room', center: { x: 152, y: 305 }, shape: { type: 'path', d: 'M80.5 175.5H221.5V426H64.5V360.5H80.5V342V175.5Z' } },
        entrance: { sidebar: 'left', label: 'Entrance', api: 'Entrance', center: { x: 389, y: 55 }, shape: { type: 'rect', x: 365.5, y: 8, w: 47, h: 93 } },
        hallway: { sidebar: 'left', label: 'Hallway', api: 'Hallway', center: { x: 312, y: 235 }, shape: { type: 'path', d: 'M365.5 101H412.5V258H391V330H350V339.5H229V197.5H221.5V143.5H365.5V101Z' } },
        unrecognized: { sidebar: 'left', label: 'Unrecognized', api: 'Unrecognized', center: null, shape: null },
        home_office: { sidebar: 'right', label: 'Home Office', api: 'Home Office', center: { x: 546, y: 195 }, shape: { type: 'rect', x: 494.5, y: 132, w: 102, h: 126 } },
        bedroom: { sidebar: 'right', label: 'Bedroom', api: 'Bedroom', center: { x: 457, y: 140 }, shape: { type: 'path', d: 'M420.5 60H596.5V131H494.5V258H420.5V60Z' } },
        workout: { sidebar: 'right', label: 'Workout', api: 'Workout', center: { x: 44, y: 309 }, shape: { type: 'rect', x: 7.5, y: 258, w: 73, h: 102 } },
        workspace: { sidebar: 'right', label: 'Workspace', api: 'Workspace', center: { x: 44, y: 202 }, shape: { type: 'rect', x: 7.5, y: 146, w: 73, h: 112 } },
        bathroom: { sidebar: 'right', label: 'Bathroom', api: 'Bathroom', center: { x: 290, y: 387 }, shape: { type: 'rect', x: 229.5, y: 347, w: 121, h: 79 } }
      },
      movements: [
        { from: 'home_office', to: 'kitchen', weight: 5, activity: 'Life Maintenance' },
        { from: 'kitchen', to: 'home_office', weight: 5, activity: 'Focused Work' },
        { from: 'home_office', to: 'bedroom', weight: 3, activity: 'Rest & Leisure' },
        { from: 'bedroom', to: 'home_office', weight: 3, activity: 'Focused Work' },
        { from: 'kitchen', to: 'living_room', weight: 2, activity: 'Rest & Leisure' },
        { from: 'living_room', to: 'kitchen', weight: 2, activity: 'Life Maintenance' },
        { from: 'kitchen', to: 'dining_area', weight: 3, activity: 'Life Maintenance' },
        { from: 'dining_area', to: 'kitchen', weight: 3, activity: 'Life Maintenance' },
        { from: 'home_office', to: 'hallway', weight: 2, activity: 'Life Maintenance' },
        { from: 'hallway', to: 'bathroom', weight: 1, activity: 'Life Maintenance' },
        { from: 'bathroom', to: 'hallway', weight: 1, activity: 'Life Maintenance' },
        { from: 'hallway', to: 'dining_area', weight: 1, activity: 'Life Maintenance' },
        { from: 'entrance', to: 'hallway', weight: 2, activity: 'Life Maintenance' },
        { from: 'hallway', to: 'workspace', weight: 1, activity: 'Focused Work' },
        { from: 'home_office', to: 'workspace', weight: 3, activity: 'Focused Work' },
        { from: 'workspace', to: 'kitchen', weight: 2, activity: 'Life Maintenance' }
      ]
    };

    let SCALE = 1;
    let DATA = null;

    function layout() {
      const margin = { x: window.innerWidth * 0.04, y: window.innerHeight * 0.12 };
      const avW = window.innerWidth - margin.x * 2;
      const avH = window.innerHeight - margin.y * 2;
      SCALE = Math.min(avW / SVG_W, avH / SVG_H) * 0.9;
      const pw = SVG_W * SCALE, ph = SVG_H * SCALE;
      const wrap = document.getElementById('plan-wrap');
      wrap.style.width = pw + 'px'; wrap.style.height = ph + 'px';
      ['struct-layer', 'furn-layer', 'hit-layer'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.setAttribute('width', pw); el.setAttribute('height', ph); }
      });
      ['heat-canvas', 'movement-canvas'].forEach(id => {
        const c = document.getElementById(id);
        if (c) { c.width = pw; c.height = ph; }
      });
      return SCALE;
    }

    fetch('/slides/api/spatial-activity')
      .then(r => r.json())
      .then(res => {
        DATA = res;
        document.getElementById('loading').style.display = 'none';
        init();
      });

    function init() {
      layout();
      renderSidebars();
      renderHeat();
      renderMovement();
      renderLabels();
      renderTooltipZones();
      renderLegend();
      window.addEventListener('resize', () => {
        layout();
        document.getElementById('labels-layer').innerHTML = '';
        renderLabels();
        renderHeat();
      });
    }

    function renderLabels() {
      const container = document.getElementById('labels-layer');
      Object.entries(CONFIG.rooms).forEach(([id, cfg]) => {
        if (!cfg.center) return;
        const rd = DATA.room_data[cfg.api] || { total: 0 };
        const div = document.createElement('div');
        div.className = 'room-label';
        div.style.left = (cfg.center.x * SCALE) + 'px';
        div.style.top = (cfg.center.y * SCALE) + 'px';
        const nameEl = document.createElement('div');
        nameEl.className = 'r-name';
        nameEl.textContent = cfg.label;
        nameEl.style.fontSize = `${Math.max(8, SCALE * 7.5)}px`;
        nameEl.style.color = rd.total > 0 ? '#111111' : '#bbbbbb';
        div.appendChild(nameEl);
        if (rd.total > 0) {
          const cntEl = document.createElement('div');
          cntEl.className = 'r-count';
          cntEl.textContent = `${rd.total} entries`;
          cntEl.style.fontSize = `${Math.max(6, SCALE * 5.5)}px`;
          div.appendChild(cntEl);
        }
        container.appendChild(div);
      });
    }

    function renderSidebars() {
      const dl = document.getElementById('left-cards'), dr = document.getElementById('right-cards');
      dl.innerHTML = ''; dr.innerHTML = '';
      Object.entries(CONFIG.rooms).forEach(([id, cfg], i) => {
        const rd = DATA.room_data[cfg.api] || { breakdown: [], total: 0 };
        const card = document.createElement('div');
        card.className = `room-card ${rd.total > 0 ? 'visible' : ''}`;
        card.style.transitionDelay = `${i * 0.08}s`;
        if (rd.total > 0) setTimeout(() => card.classList.add('visible'), 50);
        card.innerHTML = `
          <div class="card-header"><span class="card-name">${cfg.label}</span><span class="card-total">${rd.total}</span></div>
          <div class="chart-box">
            <svg class="donut-svg" id="donut-${id}" viewBox="0 0 60 60"></svg>
            <div class="chart-legend">
              ${rd.breakdown.slice(0, 3).map(b => `
                <div class="legend-row">
                  <span class="leg-mark" style="background:${ACTIVITY_THEME[b.activity] || '#888'}"></span>${getActivityLabel(b.activity, false)} <span>${Math.round(b.count / rd.total * 100)}%</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
        (cfg.sidebar === 'left' ? dl : dr).appendChild(card);
        drawDonut(id, rd.breakdown);
      });
    }

    function drawDonut(id, breakdown) {
      if (!breakdown.length) return;
      const svg = d3.select(`#donut-${id}`), radius = 28;
      const g = svg.append("g").attr("transform", `translate(30,30)`);
      const pie = d3.pie().value(d => d.count).sort(null);
      const arc = d3.arc().innerRadius(radius * 0.55).outerRadius(radius);
      g.selectAll("path").data(pie(breakdown)).enter().append("path").attr("d", arc)
        .attr("fill", d => ACTIVITY_THEME[d.data.activity] || '#888').attr("stroke", "#fff").attr("stroke-width", 1.5);
    }

    function renderHeat() {
      const canvas = document.getElementById('heat-canvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);
      
      const maxT = Math.max(...Object.values(DATA.room_data).map(d => d.total), 1);
      
      // Keep colors independent (source-over)
      ctx.globalCompositeOperation = 'source-over';

      Object.entries(CONFIG.rooms).forEach(([id, cfg]) => {
        const rd = DATA.room_data[cfg.api];
        if (!rd || rd.total === 0 || !cfg.center) return;
        
        const cx = cfg.center.x * SCALE, cy = cfg.center.y * SCALE;
        const totalIntensity = rd.total / maxT;
        // Increased radius factor from 0.2 to 0.28
        const r = (W * 0.28) * Math.pow(totalIntensity, 0.4);

        let currentAngle = -Math.PI / 2;

        rd.breakdown.forEach(b => {
          const ratio = b.count / rd.total;
          if (ratio === 0) return;
          const wedgeAngle = ratio * Math.PI * 2;
          const endAngle = currentAngle + wedgeAngle;

          ctx.save();
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, r, currentAngle, endAngle);
          ctx.closePath();
          ctx.clip();

          // Increased opacity baseline
          const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
          const clr = ACTIVITY_THEME[b.activity] || '#888';
          grad.addColorStop(0, hexToRgba(clr, 0.7 * totalIntensity + 0.15));
          grad.addColorStop(1, 'rgba(255,255,255,0)');
          
          ctx.fillStyle = grad;
          ctx.fill();
          
          ctx.restore();
          currentAngle = endAngle;
        });
      });
    }

    function renderMovement() {
      const canvas = document.getElementById('movement-canvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;

      const particles = [];
      CONFIG.movements.forEach(mv => {
        const src = CONFIG.rooms[mv.from], tgt = CONFIG.rooms[mv.to];
        if (!src || !tgt || !src.center || !tgt.center) return;
        const sx = src.center.x * SCALE, sy = src.center.y * SCALE;
        const tx = tgt.center.x * SCALE, ty = tgt.center.y * SCALE;
        const mx = (sx + tx) / 2 + (ty - sy) * 0.18, my = (sy + ty) / 2 - (tx - sx) * 0.18;

        for (let i = 0; i < mv.weight * 2; i++) {
          particles.push({
            sx, sy, tx, ty, mx, my, t: Math.random(),
            speed: 0.003 + Math.random() * 0.002, r: 1.8 + Math.random() * 1.2, 
            color: ACTIVITY_THEME[mv.activity] || ACTIVITY_THEME["Other"] || '#4b5563'
          });
        }
      });

      function drawLines() {
        ctx.clearRect(0, 0, W, H);
        CONFIG.movements.forEach(mv => {
          const src = CONFIG.rooms[mv.from], tgt = CONFIG.rooms[mv.to];
          if (!src || !tgt) return;
          ctx.beginPath();
          ctx.moveTo(src.center.x * SCALE, src.center.y * SCALE);
          ctx.quadraticCurveTo((src.center.x + tgt.center.x) / 2 * SCALE + (tgt.center.y - src.center.y) * SCALE * 0.18, (src.center.y + tgt.center.y) / 2 * SCALE - (tgt.center.x - src.center.x) * SCALE * 0.18, tgt.center.x * SCALE, tgt.center.y * SCALE);
          ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = mv.weight * 0.5; ctx.setLineDash([4, 8]); ctx.stroke(); ctx.setLineDash([]);
        });
      }

      function bezierPoint(sx, sy, mx, my, tx, ty, t) {
        const u = 1 - t;
        return { x: u * u * sx + 2 * u * t * mx + t * t * tx, y: u * u * sy + 2 * u * t * my + t * t * ty };
      }

      function animate() {
        drawLines();
        particles.forEach(p => {
          p.t += p.speed; if (p.t > 1) p.t = 0;
          const pt = bezierPoint(p.sx, p.sy, p.mx, p.my, p.tx, p.ty, p.t);
          const alpha = 0.5 + 0.5 * Math.sin(p.t * Math.PI);
          ctx.beginPath(); ctx.arc(pt.x, pt.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = hexToRgba(p.color, alpha * 0.85); ctx.fill();
        });
        requestAnimationFrame(animate);
      }
      animate();
    }

    function renderLegend() {
      const lb = document.getElementById('legend'); lb.innerHTML = '';
      Object.entries(ACTIVITY_THEME).forEach(([name, color]) => {
        const item = document.createElement('div'); item.className = 'leg-item';
        item.innerHTML = `<div class="leg-dot" style="background:${color}"></div> ${getActivityLabel(name)}`;
        lb.appendChild(item);
      });
    }

    function renderTooltipZones() {
      const g = document.getElementById('hit-zones'), tt = document.getElementById('tooltip');
      Object.entries(CONFIG.rooms).forEach(([id, cfg]) => {
        if (!cfg.shape) return; 
        let el;
        if (cfg.shape.type === 'rect') {
          el = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          el.setAttribute('x', cfg.shape.x * SCALE); el.setAttribute('y', cfg.shape.y * SCALE); el.setAttribute('width', cfg.shape.w * SCALE); el.setAttribute('height', cfg.shape.h * SCALE);
        } else {
          el = document.createElementNS("http://www.w3.org/2000/svg", "path");
          el.setAttribute('d', cfg.shape.d); el.setAttribute('transform', `scale(${SCALE})`);
        }
        el.setAttribute('fill', 'transparent'); el.setAttribute('style', 'pointer-events:all;cursor:default;');
        el.onmouseenter = (e) => {
          const rd = DATA.room_data[cfg.api] || { total: 0, dominant_activity: 'None' };
          tt.style.opacity = 1; tt.querySelector('strong').textContent = cfg.label; tt.querySelector('span').innerHTML = `<br>Logs: ${rd.total}<br>Primary: ${getActivityLabel(rd.dominant_activity, false)}`;
        };
        el.onmousemove = (e) => { tt.style.left = (e.pageX + 15) + 'px'; tt.style.top = (e.pageY + 15) + 'px'; };
        el.onmouseleave = () => tt.style.opacity = 0;
        g.appendChild(el);
      });
    }

    function hexToRgba(hex, alpha) {
      if (!hex) return `rgba(0,0,0,${alpha})`;
      const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }
  </script>
